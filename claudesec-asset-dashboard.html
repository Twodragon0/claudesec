<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>ClaudeSec — ISMS 통합 보안 대시보드</title>
<style>
:root{--bg:#0f1117;--card:#1a1d27;--card2:#1e2130;--border:#2a2d3a;--text:#e1e4eb;--muted:#8b8fa3;--accent:#6c5ce7;--green:#00b894;--yellow:#fdcb6e;--red:#e17055;--orange:#f39c12;--blue:#0984e3;--cyan:#00cec9;--pink:#fd79a8;--glass:rgba(26,29,39,.72);--glass-border:rgba(108,92,231,.18)}
[data-theme="light"]{--bg:#f0f2f5;--card:#ffffff;--card2:#f7f8fa;--border:#e0e3ea;--text:#1a1d27;--muted:#6b7085;--glass:rgba(255,255,255,.72);--glass-border:rgba(108,92,231,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;transition:background .3s,color .3s}
a{color:var(--accent);text-decoration:none}
.hdr{background:linear-gradient(135deg,rgba(26,29,39,.95) 0%,rgba(45,27,105,.85) 50%,rgba(26,29,39,.95) 100%);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
[data-theme="light"] .hdr{background:linear-gradient(135deg,rgba(255,255,255,.92) 0%,rgba(108,92,231,.08) 50%,rgba(255,255,255,.92) 100%)}
.hdr h1{font-size:20px;font-weight:700}.hdr h1 b{color:var(--accent)}
.hdr .sub{color:var(--muted);font-size:12px;margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:16px}
.hdr .ts{color:var(--muted);font-size:11px;text-align:right}
.conn-dots{display:flex;gap:8px;align-items:center}
.conn-dot{width:8px;height:8px;border-radius:50%;position:relative;cursor:default}
.conn-dot::after{content:attr(data-tip);position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none}
.conn-dot:hover::after{opacity:1}
.conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}.conn-dot.off{background:var(--muted)}
.theme-btn{background:var(--card);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.theme-btn:hover{border-color:var(--accent);background:var(--accent);color:#fff}
.tabs{display:flex;gap:0;background:var(--glass);backdrop-filter:blur(10px);border-bottom:2px solid var(--border);padding:0 16px;overflow-x:auto;position:sticky;top:0;z-index:50}
.tab{padding:11px 14px;cursor:pointer;color:#b0b8cc;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:600;font-size:13px;transition:all .25s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{font-size:9px;background:var(--border);color:#b0b8cc;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:700;transition:all .2s}
.tab.active .badge{background:rgba(108,92,231,.2);color:var(--accent)}
.wrap{padding:20px;max-width:1440px;margin:0 auto}
.pnl{display:none;animation:fadeIn .3s ease}.pnl.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:12px;padding:16px;text-align:center;transition:transform .2s,box-shadow .2s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.kpi .v{font-size:28px;font-weight:700;margin:6px 0 2px}.kpi .l{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.kpi .s{color:var(--muted);font-size:10px;margin-top:2px}
.kpi.g .v{color:var(--green)}.kpi.y .v{color:var(--yellow)}.kpi.r .v{color:var(--red)}.kpi.b .v{color:var(--blue)}.kpi.a .v{color:var(--accent)}.kpi.c .v{color:var(--cyan)}.kpi.p .v{color:var(--pink)}
.cd{background:var(--glass);backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:12px;overflow:hidden;margin-bottom:20px;transition:box-shadow .2s}
.cd:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.cd h3{padding:14px 18px;font-size:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.cd h3 .bg{background:var(--accent);color:#fff;font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{background:var(--card2);text-align:left;padding:8px 14px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;position:sticky;top:0;z-index:1;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--accent)}
th .sort-arrow{font-size:9px;margin-left:3px;opacity:.4;transition:opacity .15s}
th.sorted .sort-arrow{opacity:1;color:var(--accent)}
td{padding:8px 14px;border-top:1px solid var(--border);font-size:12px;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr{transition:background .15s}tr:hover{background:rgba(108,92,231,.05)}
.stbl{max-height:420px;overflow-y:auto}
.exp-row{cursor:pointer}.exp-row:hover{background:rgba(108,92,231,.08)}
.exp-detail{display:none;background:var(--card2)}
.exp-detail.open{display:table-row}
.ch{display:inline-block;padding:2px 9px;border-radius:8px;font-size:10px;font-weight:600}
.ch-g{background:rgba(0,184,148,.15);color:var(--green)}.ch-y{background:rgba(253,203,110,.15);color:var(--yellow)}
.ch-r{background:rgba(225,112,85,.15);color:var(--red)}.ch-b{background:rgba(9,132,227,.15);color:var(--blue)}
.ch-a{background:rgba(108,92,231,.15);color:var(--accent)}.ch-m{background:rgba(139,143,163,.12);color:var(--muted)}
.ch-c{background:rgba(0,206,201,.15);color:var(--cyan)}.ch-p{background:rgba(253,121,168,.15);color:var(--pink)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
@media(prefers-reduced-motion:reduce){*{animation-duration:0s!important;transition-duration:0s!important}}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.load-error{padding:60px 20px;text-align:center;color:var(--red);font-size:16px}
.load-error .icon{font-size:48px;margin-bottom:16px}
.load-error .msg{color:var(--muted);font-size:13px;margin-top:8px}
.pdca-ring{display:flex;justify-content:center;gap:0;margin:24px 0;flex-wrap:wrap}
.pdca-step{width:160px;height:160px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--border);position:relative;transition:all .3s;cursor:pointer;background:var(--glass);backdrop-filter:blur(6px)}
.pdca-step:hover{transform:scale(1.07);box-shadow:0 8px 32px rgba(0,0,0,.18)}
.pdca-step .phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.pdca-step .title{font-size:13px;font-weight:600;margin:4px 0}
.pdca-step .score{font-size:22px;font-weight:800}
.pdca-step .items{font-size:10px;color:var(--muted)}
.pdca-arrow{display:flex;align-items:center;font-size:20px;color:var(--border);padding:0 4px}
.pdca-P{border-color:var(--blue)}.pdca-P .phase{color:var(--blue)}
.pdca-D{border-color:var(--green)}.pdca-D .phase{color:var(--green)}
.pdca-C{border-color:var(--yellow)}.pdca-C .phase{color:var(--yellow)}
.pdca-A{border-color:var(--red)}.pdca-A .phase{color:var(--red)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{min-width:120px;font-size:12px;text-align:right;color:var(--muted)}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s}
.bar-val{min-width:80px;font-size:11px;color:var(--muted)}
.fb{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fb-btn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:11px;transition:all .2s}
.fb-btn:hover,.fb-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ring-wrap{display:flex;justify-content:center;gap:32px;margin-bottom:20px;flex-wrap:wrap}
.ring{width:100px;height:100px;position:relative;display:inline-block}.ring svg{transform:rotate(-90deg)}
.ring .rv{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;font-weight:800}
.ring .rl{text-align:center;font-size:11px;color:var(--muted);margin-top:4px}
.search-input{width:100%;padding:8px 14px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}.search-input::placeholder{color:var(--muted)}
.gauge-wrap{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gauge-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.gauge-fill{height:100%;border-radius:5px;transition:width .6s}
.gauge-lbl{font-size:12px;color:var(--muted);min-width:110px}
.gauge-val{font-size:12px;font-weight:600;min-width:70px;text-align:right}
.scan-link-card{display:flex;flex-direction:column;padding:14px 16px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);text-decoration:none;transition:all .2s;font-size:14px;font-weight:600}
.scan-link-card:hover{border-color:var(--accent);background:rgba(108,92,231,.08);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.scan-link-card span{font-size:11px;color:var(--muted);font-weight:400;margin-top:4px}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-chip{padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
.cat-chip:hover,.cat-chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.month-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding:0 20px;margin:16px 0}
.month-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.month-bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s;min-height:2px}
.month-lbl{font-size:10px;color:var(--muted)}.month-amt{font-size:9px;color:var(--muted)}
.ts-bar{display:flex;align-items:center;gap:6px;padding:6px 14px;margin-bottom:16px;background:var(--card2);border-radius:8px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.ts-bar .ts-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.ts-bar .ts-dot.stale{background:var(--yellow)}.ts-bar .ts-dot.old{background:var(--red)}
.ts-bar .ts-src{font-weight:600;color:var(--text);margin-right:2px}
.ts-bar .ts-sep{width:1px;height:14px;background:var(--border);margin:0 4px}
.xv-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.xv-stat{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
.xv-stat>div{flex:1;min-width:120px;text-align:center;padding:12px;background:var(--card);border-radius:8px;border:1px solid var(--border)}
.xv-stat .xv-num{font-size:24px;font-weight:700}.xv-stat .xv-lbl{font-size:10px;color:var(--muted);text-transform:uppercase}
</style>
</head>
<body>
<div class="hdr">
<div><h1><b>ClaudeSec</b> ISMS 통합 보안 대시보드</h1>
<div class="sub">ISMS 자산관리 · 취약점 점검 · PDCA 관리 체계</div></div>
<div class="hdr-right">
<div class="conn-dots" id="conn-dots"></div>
<a href="/scan.html" style="font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:7px;color:var(--accent);text-decoration:none;font-weight:600;transition:all .2s" onmouseover="this.style.background='var(--accent)';this.style.color='#fff'" onmouseout="this.style.background='';this.style.color='var(--accent)'">ClaudeSec 스캔 대시보드</a>
<div class="ts" id="ts"></div>
<button class="theme-btn" id="theme-toggle"></button>
</div>
</div>

<div class="tabs" id="tabs" role="tablist" aria-label="대시보드 탭">
<div class="tab active" role="tab" tabindex="0" aria-selected="true" aria-controls="p-isms" data-p="isms" id="tab-isms">ISMS PDCA<span class="badge" id="b-isms"></span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="p-sec" data-p="sec" id="tab-sec">보안<span class="badge" id="b-sec"></span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="p-asset" data-p="asset" id="tab-asset">자산 관리<span class="badge" id="b-asset"></span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="p-infra" data-p="infra" id="tab-infra">인프라<span class="badge" id="b-infra"></span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="p-saas" data-p="saas" id="tab-saas">SaaS·라이선스<span class="badge" id="b-saas"></span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="p-cost" data-p="cost" id="tab-cost">비용 분석<span class="badge" id="b-cost"></span></div>
<div class="tab" role="tab" tabindex="-1" aria-selected="false" aria-controls="p-ai" data-p="ai" id="tab-ai">AI 구독<span class="badge" id="b-ai"></span></div>
</div>

<main class="wrap">
<div class="pnl active" id="p-isms" role="tabpanel" aria-labelledby="tab-isms"></div>
<div class="pnl" id="p-sec" role="tabpanel" aria-labelledby="tab-sec"></div>
<div class="pnl" id="p-asset" role="tabpanel" aria-labelledby="tab-asset"></div>
<div class="pnl" id="p-infra" role="tabpanel" aria-labelledby="tab-infra"></div>
<div class="pnl" id="p-saas" role="tabpanel" aria-labelledby="tab-saas"></div>
<div class="pnl" id="p-cost" role="tabpanel" aria-labelledby="tab-cost"></div>
<div class="pnl" id="p-ai" role="tabpanel" aria-labelledby="tab-ai"></div>
</main>

<script>
const D=/*__DATA__*/null;

/* === Theme === */
(function(){
  var s=localStorage.getItem('claudesec-theme');
  if(!s)s=matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';
  document.documentElement.setAttribute('data-theme',s);
})();
var thBtn=document.getElementById('theme-toggle');
thBtn.setAttribute('aria-label','테마 전환');
function updThBtn(){thBtn.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'\u2600\uFE0F':'\uD83C\uDF19';}
updThBtn();
thBtn.addEventListener('click',function(){
  var c=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',c);localStorage.setItem('claudesec-theme',c);updThBtn();
});

/* === Hash ↔ Tab mapping === */
var _hashMap={isms_pdca:'isms',security:'sec',asset:'asset',infra:'infra',saas:'saas',cost:'cost',ai:'ai'};
var _hashRev={isms:'isms_pdca',sec:'security',asset:'asset',infra:'infra',saas:'saas',cost:'cost',ai:'ai'};
/* === Lazy rendering with accessible tabs === */
var rendered=new Set(['isms']),renderers={},_d=null;
function switchTab(p,noHash){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');x.setAttribute('aria-selected','false');x.setAttribute('tabindex','-1')});
  document.querySelectorAll('.pnl').forEach(function(x){x.classList.remove('active')});
  var tab=document.querySelector('.tab[data-p="'+p+'"]');
  if(tab){tab.classList.add('active');tab.setAttribute('aria-selected','true');tab.setAttribute('tabindex','0');tab.focus();}
  document.getElementById('p-'+p).classList.add('active');
  if(!rendered.has(p)&&_d&&renderers[p]){rendered.add(p);renderers[p](_d);}
  if(!noHash&&_hashRev[p])history.replaceState(null,'','#'+_hashRev[p]);
}
/* Hash-based navigation on load and hashchange */
function _navFromHash(){var h=(location.hash||'').replace('#','');if(h&&_hashMap[h])switchTab(_hashMap[h],true);}
window.addEventListener('hashchange',_navFromHash);
window.addEventListener('DOMContentLoaded',function(){setTimeout(_navFromHash,100)});
document.getElementById('tabs').addEventListener('click',function(e){
  var t=e.target.closest('.tab');if(!t)return;switchTab(t.dataset.p);
});
document.getElementById('tabs').addEventListener('keydown',function(e){
  var tabs=Array.from(document.querySelectorAll('.tab'));
  var cur=tabs.indexOf(e.target);if(cur<0)return;
  var next=-1;
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next=(cur+1)%tabs.length;
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp')next=(cur-1+tabs.length)%tabs.length;
  else if(e.key==='Home')next=0;
  else if(e.key==='End')next=tabs.length-1;
  else if(e.key==='Enter'||e.key===' '){e.preventDefault();switchTab(tabs[cur].dataset.p);return;}
  else return;
  e.preventDefault();switchTab(tabs[next].dataset.p);
});

/* === Helpers === */
var $=function(id){return document.getElementById(id)};
function esc(s){if(s==null)return'';var d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function ch(t,c){return'<span class="ch ch-'+esc(c)+'">'+esc(t)+'</span>';}
function sevCh(s){var m={critical:'r',high:'r',medium:'y',low:'b',warning:'y',info:'b'};return ch(s,m[(s||'').toLowerCase()]||'m');}
function authCh(a,sso){if(!a)return ch('N/A','m');var l=a.toLowerCase();var isSso=sso||l==='okta'||l==='okta sso'||l==='google';if(l.includes('okta'))return ch('Okta SSO','b')+(isSso?' '+ch('SSO','g'):'');if(l==='google')return ch('Google','a')+' '+ch('SSO','g');if(l.includes('mfa'))return ch('MFA','g');if(l.match(/id\/pw|ip\/pw/))return ch('ID/PW','r');return ch(a,'m');}
function stCh(s){return s==='\uC0AC\uC6A9 \uC911'?ch(s,'g'):s==='\uBBF8\uC0AC\uC6A9'?ch(s,'r'):ch(s||'','y');}
function fmt(n){return typeof n==='number'?n.toLocaleString('ko-KR'):n;}
/* Check if value contains raw HTML (chip markup) */
function isHtml(v){return typeof v==='string'&&v.indexOf('<span')===0;}

function mkT(el,hd,rows,sortOpt){
  /* sortOpt: {col:index, asc:bool} for initial sort */
  if(sortOpt&&typeof sortOpt.col==='number'){
    var sc=sortOpt.col,sa=sortOpt.asc;
    rows=rows.slice().sort(function(a,b){
      var va=a[sc]||'',vb=b[sc]||'';
      var ta=(typeof va==='string'?va:'').replace(/<[^>]*>/g,'').trim();
      var tb=(typeof vb==='string'?vb:'').replace(/<[^>]*>/g,'').trim();
      var na=parseFloat(ta.replace(/[^0-9.\-]/g,'')),nb=parseFloat(tb.replace(/[^0-9.\-]/g,''));
      if(!isNaN(na)&&!isNaN(nb))return sa?na-nb:nb-na;
      return sa?ta.localeCompare(tb,'ko'):tb.localeCompare(ta,'ko');
    });
  }
  var h='<thead><tr>'+hd.map(function(x,i){
    var isSorted=sortOpt&&sortOpt.col===i;
    return'<th data-col="'+i+'"'+(isSorted?' class="sorted" data-asc="'+(sortOpt.asc?'1':'0')+'"':'')+'>'
      +esc(x)+' <span class="sort-arrow">'+(isSorted?(sortOpt.asc?'\u25B4':'\u25BE'):'\u25B4\u25BE')+'</span></th>'
  }).join('')+'</tr></thead><tbody>';
  rows.forEach(function(r){h+='<tr>'+r.map(function(c){return'<td>'+(isHtml(c)?c:esc(c))+'</td>'}).join('')+'</tr>'});
  h+='</tbody>';el.innerHTML=h;
  /* Sortable headers */
  el._rows=rows;el._hd=hd;
  el.querySelectorAll('th').forEach(function(th){
    th.addEventListener('click',function(){
      var ci=parseInt(this.dataset.col),asc=this.dataset.asc!=='1';
      el.querySelectorAll('th').forEach(function(t){t.classList.remove('sorted');t.dataset.asc='';t.querySelector('.sort-arrow').textContent='\u25B4\u25BE'});
      this.classList.add('sorted');this.dataset.asc=asc?'1':'0';
      this.querySelector('.sort-arrow').textContent=asc?'\u25B4':'\u25BE';
      var sorted=el._rows.slice().sort(function(a,b){
        var va=a[ci]||'',vb=b[ci]||'';
        /* Strip HTML for comparison */
        var ta=va.replace(/<[^>]*>/g,'').trim(),tb=vb.replace(/<[^>]*>/g,'').trim();
        /* Try numeric (including currency ₩, $) */
        var na=parseFloat(ta.replace(/[^0-9.\-]/g,'')),nb=parseFloat(tb.replace(/[^0-9.\-]/g,''));
        if(!isNaN(na)&&!isNaN(nb))return asc?na-nb:nb-na;
        /* Try date */
        if(ta.match(/^\d{4}-\d{2}/)&&tb.match(/^\d{4}-\d{2}/))return asc?ta.localeCompare(tb):tb.localeCompare(ta);
        return asc?ta.localeCompare(tb,'ko'):tb.localeCompare(ta,'ko');
      });
      var body='';sorted.forEach(function(r){body+='<tr>'+r.map(function(c){return'<td>'+(isHtml(c)?c:esc(c))+'</td>'}).join('')+'</tr>'});
      el.querySelector('tbody').innerHTML=body;
    });
  });
}
/* Table search: attach to input, filters visible rows by text */

/* SVG sparkline */
function sparkline(data,w,h){
  if(!data||data.length<2)return'';
  var max=Math.max.apply(null,data),min=Math.min.apply(null,data),range=max-min||1;
  var pts=data.map(function(v,i){return(i/(data.length-1)*w).toFixed(1)+','+(h-(v-min)/range*(h-4)+2).toFixed(1)});
  var last=pts[pts.length-1].split(',');
  return'<svg width="'+w+'" height="'+h+'" style="vertical-align:middle"><polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.5" fill="var(--accent)"/></svg>';
}
/* SVG donut */
function donut(segs,size){
  var r=size/2-6,cx=size/2,cy=size/2,total=segs.reduce(function(a,s){return a+s.v},0);
  if(!total)return'';var offset=0,paths='',circ=2*Math.PI*r;
  segs.forEach(function(s){var pct=s.v/total;var dash=pct*circ;
    paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="10" stroke-dasharray="'+dash.toFixed(1)+' '+(circ-dash).toFixed(1)+'" stroke-dashoffset="'+(-offset*circ/total).toFixed(1)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    offset+=s.v;});
  return'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'+paths+'</svg>';
}
/* Score ring */
function scoreRing(score,max,label,color,sz){
  sz=sz||100;var r=sz/2-8,circ=2*Math.PI*r,pct=Math.min(score/max,1);
  return'<div style="text-align:center;display:inline-block"><div class="ring" style="width:'+sz+'px;height:'+sz+'px"><svg width="'+sz+'" height="'+sz+'"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="var(--border)" stroke-width="6"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+(color||'var(--accent)')+'" stroke-width="6" stroke-dasharray="'+(pct*circ).toFixed(1)+' '+(circ-pct*circ).toFixed(1)+'" stroke-linecap="round" transform="rotate(-90 '+sz/2+' '+sz/2+')"/></svg><div class="rv" style="color:'+(color||'var(--accent)')+'">'+esc(score)+'</div></div><div class="rl">'+esc(label)+'</div></div>';
}
/* Gauge */
function gauge(val,max,label,color){
  var pct=max?Math.min(Math.round(val/max*100),100):0;
  return'<div class="gauge-wrap"><div class="gauge-lbl">'+esc(label)+'</div><div class="gauge-track"><div class="gauge-fill" style="width:'+pct+'%;background:'+(color||'var(--accent)')+'"></div></div><div class="gauge-val">'+esc(val)+'/'+esc(max)+' ('+pct+'%)</div></div>';
}
/* Timestamp bar: [{src:'Datadog',time:'2026-03-17 03:22 UTC'},...] */
function tsBar(items){
  return'<div class="ts-bar">'+items.map(function(i){
    var cls='ts-dot';if(!i.time)cls+=' old';

/* Month bar chart */
function monthBars(months,el){
  if(!months||!months.length)return;

  el.innerHTML='<div class="month-bars">'+months.map(function(m){

}

/* Prowler cards renderer */
function _renderProwCards(el,rows,defaultColor){
  var html='';
  rows.forEach(function(f){
    var sevColor=f.severity==='Critical'?'var(--red)':f.severity==='High'?'var(--orange)':defaultColor||'var(--yellow)';
    var checkId=(f.check||'').replace(/^prowler-[^-]+-/,'').replace(/-[a-f0-9]{6,}$/,'').replace(/-\d{12}.*$/,'');
    var hubUrl=f.hub_url||(checkId?'https://hub.prowler.com/check/'+encodeURIComponent(checkId):'');
    html+='<div style="border:1px solid var(--border);border-left:3px solid '+sevColor+';border-radius:8px;margin-bottom:8px;overflow:hidden;cursor:pointer" onclick="var d=this.querySelector(\'.prow-det\');var a=this.querySelector(\'.prow-arrow\');if(d.style.display===\'none\'){d.style.display=\'block\';a.textContent=\'\\u25BE\'}else{d.style.display=\'none\';a.textContent=\'\\u25B8\'}">';
    html+='<div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--card2)">';
    html+=sevCh(f.severity)+' '+ch(f.provider||'','b');

/* SSO tracking in SaaS tab */
function _renderSsoTrack(saas){
  var el=$('saas-sso-track');if(!el||!saas.length)return;
  var ssoKw=['sso','okta','saml'];
  var ssoApps=saas.filter(function(s){var a=(s.auth||'').toLowerCase();return ssoKw.some(function(k){return a.indexOf(k)>=0})});
  var googleApps=saas.filter(function(s){var a=(s.auth||'').toLowerCase();return a.indexOf('google')>=0&&!ssoKw.some(function(k){return a.indexOf(k)>=0})});
  var idpwApps=saas.filter(function(s){var a=(s.auth||'').toLowerCase();return a.indexOf('id/pw')>=0||a.indexOf('id pw')>=0||a==='id/pw'});
  var otherApps=saas.filter(function(s){var a=(s.auth||'').toLowerCase();return!ssoKw.some(function(k){return a.indexOf(k)>=0})&&a.indexOf('google')<0&&a.indexOf('id/pw')<0&&a.indexOf('id pw')<0&&a!=='id/pw'});
  var ssoPct=Math.round(ssoApps.length/saas.length*100);
  var gPct=Math.round(googleApps.length/saas.length*100);
  var totalPct=Math.round((ssoApps.length+googleApps.length)/saas.length*100);
  var pctColor=totalPct>=70?'var(--green)':totalPct>=50?'var(--yellow)':'var(--red)';
  var sh='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">';
  sh+='<div style="flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden;display:flex">';
  sh+='<div style="width:'+ssoPct+'%;background:var(--blue);height:100%" title="Okta SSO '+ssoPct+'%"></div>';
  sh+='<div style="width:'+gPct+'%;background:var(--accent);height:100%" title="Google SSO '+gPct+'%"></div>';
  sh+='</div>';
  sh+='<span style="font-size:14px;font-weight:700;color:'+pctColor+'">'+totalPct+'%</span>';
  sh+='</div>';
  sh+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">';
  sh+='<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--blue);color:#fff">Okta SSO '+ssoApps.length+' ('+ssoPct+'%)</span>';
  sh+='<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--accent);color:#fff">Google '+googleApps.length+' ('+gPct+'%)</span>';
  sh+='<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--red);color:#fff">ID/PW '+idpwApps.length+'</span>';
  if(otherApps.length)sh+='<span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--yellow);color:#000">Other '+otherApps.length+'</span>';
  sh+='</div>';
  if(idpwApps.length){
    sh+='<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--red)">SSO 전환 필요 (ID/PW)</div>';
    sh+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px">';
    idpwApps.forEach(function(s){
      var hr=['adp','carta','anthem','hartford','payroll','\uC6D4\uAE09'].some(function(k){return(s.name||'').toLowerCase().indexOf(k)>=0||(s.category||'').toLowerCase().indexOf(k)>=0});
      var pri=hr?'r':'y';var priL=hr?'높음':'중간';
      sh+='<div style="padding:6px 10px;border:1px solid var(--border);border-left:3px solid var(--'+pri+');border-radius:6px;font-size:11px">';
      sh+='<strong>'+esc(s.name||'')+'</strong> '+ch(priL,pri);
      if(s.category)sh+='<div style="color:var(--muted);font-size:10px">'+esc(s.category)+'</div>';
      sh+='</div>';
    });
    sh+='</div>';
  }
  if(otherApps.length){
    sh+='<div style="font-size:12px;font-weight:600;margin:10px 0 6px;color:var(--yellow)">SSO 검토 필요 (기타 인증)</div>';
    sh+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px">';
    otherApps.forEach(function(s){
      sh+='<div style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:11px">';
      sh+='<strong>'+esc(s.name||'')+'</strong> <span style="color:var(--muted)">'+esc(s.auth||'')+'</span>';
      sh+='</div>';
    });
    sh+='</div>';
  }
  el.innerHTML=sh;
}

    +'<div class="g2"><div class="cd"><h3>\uC0AC\uC6A9\uC790\uBCC4 \uBE44\uC6A9 <span class="bg" id="user-cost-c"></span></h3><div class="stbl"><table id="t-user-cost"></table></div></div>'

    +'<div class="g2"><div class="cd"><h3>\uC6D4\uBCC4 \uC9C0\uCD9C \uC0C1\uC138 <span class="bg" id="cost-c"></span></h3><div class="fb" id="cost-fb"></div><div class="stbl"><table id="t-cost"></table></div></div>'
    +'<div class="cd"><h3>SaaS \uBE44\uC6A9 Top 15</h3><div style="padding:16px" id="cost-bars"></div></div></div>';
  var noSum=cs.filter(function(x){return!x.software.match(/\uD569\uACC4/)});

  el.innerHTML=tsBar([{src:'Datadog SIEM',time:t.datadog},{src:'Notion',time:t.notion}])+'<div id="k-sig" class="kpis"></div><div id="t-audit-trend"></div><div class="cd"><h3>Notion 보안 정기점검 이력 <span class="bg" id="audit-c"></span></h3><div id="t-audit" style="padding:12px 16px;max-height:520px;overflow-y:auto"></div></div><div class="cd"><h3>Datadog 보안 시그널 (최근 14일) <span class="bg" id="sig-c"></span></h3><div class="stbl"><table id="t-sig"></table></div></div>';
  mkK($('k-sig'),[
    {l:'정기점검',v:audits.length+'회',c:'b',s:'Notion 스프린트보드'},
    {l:'DD 시그널',v:sigs.length+'건',c:sigs.length>5?'y':'g',s:'최근 14일'},
    {l:'최근 점검',v:audits.length?audits[0].date||'-':'-',c:'a'},
    {l:'최근 영향도',v:audits.length?audits[0].impact||'-':'-',c:audits.length&&parseInt(audits[0].impact)>=8?'r':'g'}
  ]);
  /* Impact trend sparkline */
  if(audits.length>1){
    var impactScores=audits.map(function(a){return parseInt(a.impact)||0}).reverse();
    var trendEl=$('t-audit-trend');
    var trendHtml='<div class="cd"><h3>영향도 추이 <span style="margin-left:8px">'+sparkline(impactScores,200,40)+'</span></h3>';
    trendHtml+='<div style="padding:12px 16px;display:flex;gap:16px;flex-wrap:wrap">';
    audits.slice(0,8).forEach(function(a){
      var imp=parseInt(a.impact)||0;
      var color=imp>=8?'var(--red)':imp>=5?'var(--yellow)':'var(--green)';
      trendHtml+='<div style="text-align:center;min-width:60px"><div style="font-size:18px;font-weight:800;color:'+color+'">'+imp+'</div><div style="font-size:10px;color:var(--muted)">'+esc(a.date||'').substring(5)+'</div></div>';
    });
    trendHtml+='</div></div>';
    trendEl.innerHTML=trendHtml;
  }
  /* Notion audit cards — expandable with full summary */
  var auditEl=$('t-audit');
  var auditHtml='';
  audits.forEach(function(a,i){
    var impN=parseInt(a.impact)||0;
    var impCh=impN>=8?ch(a.impact,'r'):impN>=5?ch(a.impact,'y'):ch(a.impact,'g');
    var priCh=(a.priority==='매우 높음'||a.priority==='최우선')?ch(a.priority,'r'):ch(a.priority||'','m');
    var tagHtml=(a.tags||[]).map(function(t){return ch(t,'b')}).join(' ');
    var url=esc(a.url||'');
    var hasUrl=url&&url!=='';
    auditHtml+='<div class="audit-card" onclick="this.classList.toggle(\'open\')" style="border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;cursor:pointer;transition:all .2s;'+(impN>=8?'border-left:3px solid var(--red)':impN>=5?'border-left:3px solid var(--yellow)':'border-left:3px solid var(--green)')+'">';
    auditHtml+='<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card2)">';
    auditHtml+='<span style="min-width:80px;font-size:12px;color:var(--muted);font-weight:600">'+esc(a.date||'')+'</span>';
    auditHtml+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(a.title||'')+'</div>';
    if(a.summary)auditHtml+='<div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4;max-height:2.8em;overflow:hidden">'+esc(a.summary.substring(0,120))+(a.summary.length>120?'...':'')+'</div>';
    auditHtml+='</div>';
    auditHtml+='<span>'+priCh+'</span>';
    auditHtml+='<span style="min-width:24px;text-align:center">'+impCh+'</span>';
    auditHtml+='<span style="font-size:11px;color:var(--muted)">'+(impN>=8?'\u25BE':'\u25B8')+'</span>';
    auditHtml+='</div>';
    auditHtml+='<div class="audit-detail" style="display:'+(impN>=8?'block':'none')+';padding:14px 16px;border-top:1px dashed var(--border);background:var(--card)">';
    auditHtml+='<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">';
    auditHtml+=ch(a.status||'','g')+' '+tagHtml;
    if(hasUrl)auditHtml+=' <a href="'+url+'" target="_blank" rel="noopener" style="color:var(--accent);font-size:12px;text-decoration:underline;text-underline-offset:2px;margin-left:auto" onclick="event.stopPropagation()">Notion에서 열기 ↗</a>';
    auditHtml+='</div>';
    if(a.summary){
      auditHtml+='<div style="font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word">'+esc(a.summary)+'</div>';
    }
    auditHtml+='</div></div>';
  });
  auditEl.innerHTML=auditHtml||'<div style="padding:20px;color:var(--muted);text-align:center">점검 이력이 없습니다.</div>';
  $('audit-c').textContent=audits.length+'회';
  /* Toggle audit card expand */
  auditEl.querySelectorAll('.audit-card').forEach(function(card){
    card.addEventListener('click',function(){
      var det=this.querySelector('.audit-detail');
      var arrow=this.querySelector('div:first-child span:last-child');
      if(det.style.display==='none'){det.style.display='block';if(arrow)arrow.textContent='▾'}
      else{det.style.display='none';if(arrow)arrow.textContent='▸'}
    });
  });
  mkT($('t-sig'),['\uBC1C\uC0DD\uC2DC\uAC01','\uC2EC\uAC01\uB3C4','\uC0C1\uD0DC','\uC81C\uBAA9','\uD0DC\uADF8'],sigs.map(function(s){return[esc(s.timestamp||''),sevCh(s.severity),esc(s.status||''),esc(s.title||''),(s.tags||[]).map(function(t){return esc(t)}).join(', ')]}),{col:0,asc:false});
  $('sig-c').textContent=sigs.length+'건';
}

if(D)render(D);
else fetch('.claudesec-assets/dashboard-data.json').then(function(r){if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}).then(render).catch(function(e){
  document.getElementById('p-isms').innerHTML='<div class="load-error"><div class="icon">⚠</div><div>대시보드 데이터 로딩 실패</div><div class="msg">'+esc(e.message||'알 수 없는 오류')+'</div><div class="msg" style="margin-top:12px">python3 scripts/build-dashboard.py 실행 후 다시 시도하세요.</div></div>';
});
</script>
<script id="jd" type="application/json">__DASHBOARD_DATA__</script>
</body>
