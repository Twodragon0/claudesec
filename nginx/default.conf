server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Disable nginx version disclosure
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # Security headers (CSP is set via HTML meta tag to avoid conflicts)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HTML: no cache (always fetch latest)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        try_files $uri $uri/ =404;
    }

    # Static assets: long cache (7 days) — excludes json (data files need fresh reads)
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        try_files $uri =404;
    }

    # Legacy URL redirects (browser cache/bookmarks)
    # Use absolute_redirect off so nginx emits relative Location headers,
    # avoiding port mismatch when running behind Docker port mapping.
    absolute_redirect off;

    location = /claudesec-asset-dashboard.html {
        return 301 /;
    }
    location = /claudesec-asset-dashboard-live.html {
        return 301 /;
    }
    location = /claudesec-dashboard.html {
        return 301 /scan.html;
    }

    # Default location
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Allow dashboard data assets
    location ^~ /.claudesec-assets/ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Deny access to other hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
