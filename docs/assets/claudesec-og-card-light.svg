<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ClaudeSec — DevSecOps 통합 보안 대시보드">
  <title>ClaudeSec — DevSecOps 통합 보안 대시보드</title>
  <desc>AI-assisted secure development toolkit. Live security posture: 21/21 OWASP checks, grade A, zero critical findings.</desc>

  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#f8fafc"/>
  <rect x="0" y="0" width="760" height="630" fill="#f8fafc"/>
  <rect x="760" y="0" width="440" height="630" fill="#f1f5f9"/>
  <rect x="0" y="0" width="1200" height="4" fill="#0284c7"/>
  <rect x="760" y="0" width="1" height="630" fill="#e2e8f0"/>
  <rect x="0" y="0" width="760" height="630" fill="url(#grid)" opacity="0.4"/>

  <!-- Decorative shield watermark (left) -->
  <path d="M80 80 L80 300 Q80 380 160 420 L200 440 L240 420 Q320 380 320 300 L320 80 Z"
        fill="none" stroke="#cbd5e1" stroke-width="2" opacity="0.8"/>
  <rect x="148" y="210" width="56" height="46" rx="8" fill="none" stroke="#cbd5e1" stroke-width="2" opacity="0.6"/>
  <path d="M160 210 v-10 c0-11 9-20 20-20 s20 9 20 20 v10" fill="none" stroke="#cbd5e1" stroke-width="2" opacity="0.6"/>

  <!-- LEFT: Wordmark -->
  <text x="80" y="230"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="88" font-weight="700" letter-spacing="-2" fill="#0f172a">
    <tspan fill="#0f172a">Claude</tspan><tspan fill="#0284c7">Sec</tspan>
  </text>
  <rect x="80" y="248" width="520" height="3" fill="#0284c7" filter="url(#glow)"/>

  <!-- LEFT: Taglines -->
  <text x="80" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="36" font-weight="600" fill="#0f172a" letter-spacing="0.5">DevSecOps 통합 보안 대시보드</text>
  <text x="80" y="368"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#64748b" letter-spacing="0.3">AI-assisted secure development</text>

  <!-- LEFT: Feature pills -->
  <rect x="80" y="420" width="180" height="36" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="170" y="443" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#475569">보안 스캐너</text>
  <rect x="274" y="420" width="160" height="36" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="354" y="443" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#475569">ISMS-P PDCA</text>
  <rect x="448" y="420" width="150" height="36" rx="18" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <text x="523" y="443" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#475569">컴플라이언스</text>

  <!-- LEFT: GitHub URL -->
  <circle cx="58" cy="558" r="5" fill="#0284c7" opacity="0.8"/>
  <text x="80" y="565"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="400" fill="#0284c7" opacity="0.9">github.com/Twodragon0/claudesec</text>

  <!-- RIGHT: Section header -->
  <text x="980" y="90" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="13" font-weight="600" fill="#64748b" letter-spacing="3">SECURITY POSTURE</text>
  <rect x="900" y="100" width="160" height="2" fill="#0284c7" opacity="0.5"/>

  <!-- RIGHT: Metric chip 1 — coverage -->
  <rect x="820" y="130" width="320" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="820" y="130" width="4" height="130" rx="2" fill="#0284c7"/>
  <text x="980" y="195" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="700" fill="#0f172a" letter-spacing="-1">21<tspan fill="#94a3b8" font-size="42">/21</tspan></text>
  <text x="980" y="232" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.5">OWASP Top 10 checks</text>

  <!-- RIGHT: Metric chip 2 — grade -->
  <rect x="820" y="280" width="320" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="820" y="280" width="4" height="130" rx="2" fill="#0284c7"/>
  <text x="980" y="345" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="700" fill="#0284c7" letter-spacing="-1">A</text>
  <text x="980" y="382" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.5">grade · score 100</text>

  <!-- RIGHT: Metric chip 3 — zero criticals -->
  <rect x="820" y="430" width="320" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="820" y="430" width="4" height="130" rx="2" fill="#0284c7"/>
  <text x="980" y="495" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="700" fill="#0f172a" letter-spacing="-1">0</text>
  <text x="980" y="532" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.5">critical findings</text>

  <!-- RIGHT: Source caption -->
  <text x="980" y="595" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="11" font-weight="400" fill="#94a3b8" letter-spacing="1">live · scan-report.json</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#e2e8f0"/>

  <!-- Corner accents -->
  <path d="M1160 0 L1200 0 L1200 40" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.6"/>
  <path d="M40 0 L0 0 L0 40" fill="none" stroke="#0284c7" stroke-width="2" opacity="0.6"/>
</svg>
