# Dashboard Auto-Refresh
# Rebuilds scan report and dashboard HTML on a schedule.
#
# Runs weekly (Sunday 00:00 UTC / 09:00 KST) plus manual dispatch.
# The daily cadence was lowered to weekly because:
#   - security-scan.yml already runs on every push to main and once a
#     week (Mon 09:00 UTC), so the dashboard is regenerated whenever code
#     actually changes.
#   - lighthouse.yml audits the live deployed Pages daily and catches
#     SEO / accessibility regressions from upstream changes on its own.
#   - Rebuilding the docker image + running the full scanner + Lighthouse
#     audit cost ~5min of CI per run, so the daily cadence consumed
#     ~150 min/month of Actions minutes with no incremental signal vs.
#     the on-push path.

name: Dashboard Refresh

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-refresh
  cancel-in-progress: true

jobs:
  refresh:
    name: Scan & Rebuild Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python3 -m pip install --upgrade -r requirements-ci.txt

      - name: Build scanner image
        run: docker build -t claudesec:local .

      - name: Run scan and generate dashboard
        # CLAUDESEC_DASHBOARD_OFFLINE=1 skips GitHub API calls for best-practice
        # content that block in CI due to unauthenticated rate-limits and retries.
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e SCAN_DIR=/workspace \
            -e HOME=/tmp \
            -e CLAUDESEC_DASHBOARD_OFFLINE=1 \
            claudesec:local dashboard -d /workspace -c all --no-serve

      - name: Verify dashboard generated
        run: |
          test -f claudesec-dashboard.html
          size=$(wc -c < claudesec-dashboard.html)
          echo "Dashboard size: $size bytes"
          if [ "$size" -lt 1000 ]; then
            echo "::error::Dashboard file too small ($size bytes)"
            exit 1
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dashboard-${{ github.run_id }}
          path: claudesec-dashboard.html
          retention-days: 7
