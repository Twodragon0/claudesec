# cross-os-checks.yml
#
# Intentionally NON-BLOCKING / INFORMATIONAL.
# This workflow is NOT listed in lint.yml's lint-gate.needs and is NOT a
# required status check in branch-protection. It runs the macOS CIS and
# Windows KISA scanner checks on real OS runners to surface live platform
# verdicts without blocking merges on any PR.
#
# Phase 2: macOS + Windows matrix.

name: Cross-OS Checks (informational)

on:
  pull_request:
    paths:
      - 'scanner/checks/macos/**'
      - 'scanner/checks/windows/**'
      - 'scanner/lib/checks.sh'
      - 'scanner/lib/output.sh'
      - 'scanner/tests/test_check_macos_cis_security_live.sh'
      - 'scanner/tests/test_check_windows_kisa_security_live.sh'
      - '.github/workflows/cross-os-checks.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

concurrency:
  group: cross-os-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-os-checks:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS CIS live checks (structural)
            test: scanner/tests/test_check_macos_cis_security_live.sh
          - os: windows-latest
            name: Windows KISA live checks (structural)
            test: scanner/tests/test_check_windows_kisa_security_live.sh
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Run OS-specific structural integration test
        shell: bash
        run: bash ${{ matrix.test }}
