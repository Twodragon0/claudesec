name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --exclude 'isms.kisa.or.kr'
            --exclude 'isms-p.or.kr'
            --exclude 'privacy.go.kr'
            --exclude 'law.go.kr'
            --exclude 'atlas.mitre.org'
            --exclude 'airc.nist.gov'
            --exclude 'media.defense.gov'
            --exclude 'jamf.com'
            --exclude 'kyverno.io'
            --exclude 'contributor-covenant.org'
            --exclude 'conventionalcommits.org'
            --exclude 'github.com/Twodragon0/claudesec/discussions'
            --accept 403,429
            --timeout 20
            '**/*.md'
          fail: true
          lycheeVersion: latest
