name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job: changes
  # Detects what kinds of files were touched in this PR/push so the heavy
  # downstream jobs can skip when they are not relevant. The lint-gate at the
  # bottom treats `skipped` results as success, so docs-only PRs short-circuit
  # the docker / scanner / coverage jobs while markdown-lint / link-check /
  # gitleaks / pii-check / frontmatter-check still execute.
  # Uses raw git diff (no external action) — pinned and auditable.
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      scanner: ${{ steps.detect.outputs.scanner }}
      docker: ${{ steps.detect.outputs.docker }}
      python_deps: ${{ steps.detect.outputs.python_deps }}
      npm_deps: ${{ steps.detect.outputs.npm_deps }}
      shell: ${{ steps.detect.outputs.shell }}
      markdown: ${{ steps.detect.outputs.markdown }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          NULL_SHA: "0000000000000000000000000000000000000000"
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_SHA" --depth=1 >/dev/null 2>&1 || true
            FILES=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA")
          elif [ -n "${BEFORE_SHA:-}" ] && [ "$BEFORE_SHA" != "$NULL_SHA" ]; then
            git fetch origin "$BEFORE_SHA" --depth=1 >/dev/null 2>&1 || true
            FILES=$(git diff --name-only "$BEFORE_SHA"..HEAD 2>/dev/null \
                    || git diff --name-only HEAD~1..HEAD)
          else
            FILES=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || true)
          fi
          echo "Changed files:"
          echo "$FILES"

          match() {
            if printf '%s\n' "$FILES" | grep -E "$1" >/dev/null 2>&1; then
              echo true
            else
              echo false
            fi
          }
          # Scanner: includes lib/, tests/, claudesec entrypoint, and
          # supporting scripts/Dockerfile/requirements (anything that could
          # change pytest / kcov outcomes). Also matches the lint workflow
          # itself so changes to the gating logic re-run the heavy jobs and
          # cannot accidentally turn off validation via a workflow-only PR.
          {
            echo "scanner=$(match '^(scanner/|scripts/|hooks/|Dockerfile|docker-compose|requirements.*\.txt|lychee\.toml$|\.github/workflows/lint\.yml)')"
            echo "docker=$(match '^(Dockerfile|docker-compose|scripts/run-dashboard-docker|scanner/lib/dashboard-|\.github/workflows/lint\.yml)')"
            echo "python_deps=$(match '^(requirements.*\.txt|pyproject\.toml|setup\.py)')"
            echo "npm_deps=$(match '^(package(-lock)?\.json|\.nvmrc)')"
            echo "shell=$(match '\.(sh|bash)$')"
            echo "markdown=$(match '(\.md$|^lychee\.toml$)')"
          } >> "$GITHUB_OUTPUT"

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0 (node24)
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  npm-audit:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.npm_deps == 'true' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'
          cache: 'npm'
      - name: npm audit
        run: npm audit --audit-level=high

  pip-audit:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python_deps == 'true' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'
      - name: Install pip-audit and project dependencies
        run: |
          # Upgrade pip first to clear CVE-2026-6357 (fix in pip 26.1)
          python3 -m pip install --upgrade 'pip>=26.1'
          python3 -m pip install --upgrade pip-audit
          python3 -m pip install -r requirements-ci.txt
      - name: Run pip-audit
        # CVE-2026-4539: pygments <=2.19.2 local ReDoS — no fix available yet
        # CVE-2026-3219: pip 26.0.1 tar+ZIP confusion — no fix version published yet
        run: pip-audit --strict --desc --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219

  shell-lint:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.shell == 'true' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run ShellCheck (pinned action + pinned engine version)
        # ludeeus/action-shellcheck@00cae500 is a composite action (no node runtime),
        # so it is unaffected by the 2026-06-02 node20 deprecation.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        env:
          SHELLCHECK_OPTS: -x
        with:
          version: v0.11.0
          severity: error
          scandir: '.'
          ignore_paths: >-
            node_modules
            .venv*
            docs
            templates
            examples
            assets
            .claude
            .github
          additional_files: run
          check_together: 'yes'

  scanner-unit-tests:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.scanner == 'true' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt
      - name: Install Python test deps
        run: python3 -m pip install --upgrade -r requirements-ci.txt
      - name: Run bash unit tests (kubeconfig discovery, OIDC detection)
        run: bash scanner/tests/test_kube_discovery.sh
      - name: Run bash unit tests (output.sh functions)
        run: bash scanner/tests/test_output_functions.sh
      - name: Run bash unit tests (infra/docker checks)
        run: bash scanner/tests/test_check_infra_docker.sh
      - name: Run bash unit tests (code/injection checks)
        run: bash scanner/tests/test_check_code_injection.sh
      - name: Run bash unit tests (access-control checks)
        run: bash scanner/tests/test_check_access_control.sh
      - name: Run bash unit tests (network/tls checks)
        run: bash scanner/tests/test_check_network_tls.sh
      - name: Run bash unit tests (cicd/pipeline checks)
        run: bash scanner/tests/test_check_cicd_pipeline.sh
      - name: Run bash unit tests (code/security-flaws checks)
        run: bash scanner/tests/test_check_code_security_flaws.sh
      - name: Run bash unit tests (code/sast-tools checks)
        run: bash scanner/tests/test_check_code_sast_tools.sh
      - name: Run bash unit tests (infra/iac checks)
        run: bash scanner/tests/test_check_infra_iac.sh
      - name: Run bash unit tests (access-control/secrets-scan checks)
        run: bash scanner/tests/test_check_secrets_scan.sh
      - name: Run bash unit tests (ai/llm-security checks)
        run: bash scanner/tests/test_check_ai_llm_security.sh
      - name: Run bash unit tests (cloud/gcp-azure checks)
        run: bash scanner/tests/test_check_cloud_gcp_azure.sh
      - name: Run bash unit tests (macos/cis-security checks)
        run: bash scanner/tests/test_check_macos_cis_security.sh
      - name: Run bash unit tests (windows/kisa-security checks)
        run: bash scanner/tests/test_check_windows_kisa_security.sh
      - name: Run bash unit tests (saas/api-checks)
        run: bash scanner/tests/test_check_saas_api_checks.sh
      - name: Run bash unit tests (saas/api-extended)
        run: bash scanner/tests/test_check_saas_api_extended.sh
      - name: Run bash unit tests (saas/audit-points)
        run: bash scanner/tests/test_check_saas_audit_points.sh
      - name: Run bash unit tests (saas/solutions)
        run: bash scanner/tests/test_check_saas_solutions.sh
      - name: Run bash unit tests (saas/zscaler)
        run: bash scanner/tests/test_check_saas_zscaler.sh
      - name: Run bash unit tests (prowler provider build parity)
        run: bash scanner/tests/test_prowler_provider_build_parity.sh
      - name: Run bash unit tests (security-lint PreToolUse hook)
        run: bash scanner/tests/test_hook_security_lint.sh
      - name: Run scanner pytest + coverage gate (>=99%)
        id: scanner_tests
        env:
          PYTHONPATH: .
          CLAUDESEC_DASHBOARD_OFFLINE: "1"
        run: |
          python3 -m py_compile scanner/lib/dashboard-gen.py scanner/lib/compliance-map.py scanner/tests/test_dashboard_gen_smoke.py scanner/tests/test_markdown_preview.py scanner/tests/test_prowler_ocsf.py scanner/tests/test_prowler_ocsf_e2e.py scanner/tests/test_compliance_map.py
          mkdir -p test-reports
          set +e
          python3 -m pytest scanner/tests/ \
            --junitxml=test-reports/pytest-junit.xml \
            --cov=scanner/lib \
            --cov-report=term \
            --cov-report=xml:test-reports/coverage.xml \
            --cov-fail-under=99 \
            -q
          test_exit_code=$?
          echo "test_exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish scanner unittest report
        if: always()
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16  # v6.4.2
        with:
          report_paths: 'test-reports/*.xml'
          fail_on_failure: false
          require_tests: false
      - name: Upload scanner unittest + coverage artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: scanner-unit-test-xml-${{ github.run_id }}
          path: test-reports/*.xml
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        continue-on-error: true
        with:
          files: test-reports/coverage.xml
          flags: scanner-lib
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Fail workflow on scanner unittest / coverage failure
        if: always() && steps.scanner_tests.outputs.test_exit_code != '0'
        run: |
          echo "scanner-unit-tests failed (or coverage below 90%) with exit code ${{ steps.scanner_tests.outputs.test_exit_code }}"
          exit 1

  scanner-shell-coverage:
    # Builds kcov v42 from source instead of using jammy's apt package
    # (which ships kcov 38, a known-broken version that reported 0%
    # coverage for `source`d bash files in earlier runs — see the
    # history around #116/#117). Build-from-source also lets this job
    # run on `ubuntu-latest` (noble) again, where kcov was dropped from
    # the default apt repos.
    #
    # The kcov v42 binary is cached via actions/cache so the ~5min
    # cmake/make compile only runs on cache miss. Runtime libraries
    # (libdw1, libcurl4) are installed on every run since they are tiny
    # and not included in the cache.
    runs-on: ubuntu-latest
    needs: [changes, scanner-unit-tests]
    if: needs.changes.outputs.scanner == 'true' || github.event_name == 'schedule'
    env:
      # Run dashboard generation fully offline under kcov. Without this,
      # generate_html_dashboard() spawns python3 dashboard-gen.py, which makes
      # live GitHub API calls (dashboard_data_loader.py gates them on this var).
      # test_output_coverage.sh alone calls generate_html_dashboard 24 times, so
      # those network round-trips — amplified by kcov's ptrace tracing of every
      # subprocess — drove the per-test runtime to the 120s cap with wall-clock
      # variance of 35s~27min (the variance was network latency, not xtrace; this
      # is the actual root cause behind the earlier-refuted H2 hypothesis). The
      # network calls live in python, NOT in checks.sh/output.sh, so they
      # contribute ZERO to the bash coverage measured here — pure waste. Offline
      # mode keeps output.sh's python-invocation path identical (exit 0, file
      # written) so measured bash coverage is unchanged; local: 120s+ -> 3.7s.
      CLAUDESEC_DASHBOARD_OFFLINE: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Cache kcov v42 binary
        id: kcov-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: |
            /usr/local/bin/kcov
            /usr/local/share/doc/kcov
            /usr/local/share/kcov
          key: kcov-v42-${{ runner.os }}-${{ runner.arch }}-noble-v1
      - name: Install kcov runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libdw1 libcurl4 libssl3 zlib1g binutils
      - name: Build kcov v42 from source
        if: steps.kcov-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y --no-install-recommends \
            binutils-dev libcurl4-openssl-dev libdw-dev libiberty-dev \
            libssl-dev zlib1g-dev cmake g++ pkg-config
          TMP=$(mktemp -d)
          cd "$TMP"
          curl -fsSL https://github.com/SimonKagstrom/kcov/archive/refs/tags/v42.tar.gz | tar xz
          cd kcov-42
          mkdir build && cd build
          cmake -DCMAKE_INSTALL_PREFIX=/usr/local ..
          make -j"$(nproc)"
          sudo make install
      - name: Verify kcov binary
        run: kcov --version
      - name: Run scanner shell tests under kcov
        run: |
          mkdir -p kcov-out
          # Invoke the script DIRECTLY — not `bash script.sh` — otherwise
          # kcov instruments the bash binary (C code) instead of the
          # script's bash lines, producing 0 total_lines.
          # Filename-substring --include-pattern so the `../lib` sourced
          # paths match (see commit history for why /scanner/lib/ patterns
          # failed). We intentionally measure only the SUT (checks.sh,
          # output.sh) and NOT each test_*.sh's own line coverage — kcov
          # cannot reliably trace into multi-line `$(...)` command-
          # substitution subshells that some tests rely on for stub
          # scoping, which would otherwise pollute the overall percentage
          # with false-negative uncovered lines in test code.
          #
          # Per-test ::group:: + start/elapsed printf makes per-test runtime
          # visible in the run log. The earlier 35s~27min wall-clock variance
          # was root-caused (#190) to un-gated GitHub API calls from
          # dashboard-gen.py when CLAUDESEC_DASHBOARD_OFFLINE was unset on this
          # job — NOT kcov ptrace/xtrace amplification. With the job-level
          # offline env (above) + the per-test hermetic guard (#191), every test
          # now completes in <=9s under kcov (observed max: test_checks_helpers
          # 4-9s; all others <=3s across the #190/#191 runs).
          #
          # `timeout 30` is a defensive cap, tightened 120->30 after the root
          # cause was removed (#193). 30s is ~3.3x the observed max with ample
          # runner-variance headroom, yet catches a future network-dependent
          # regression in 30s instead of 120s. Exit 124 (cap hit) is treated as
          # a warning so the remaining tests still run and we still get a
          # coverage merge; normal kcov exit codes are preserved.
          chmod +x scanner/tests/test_*.sh
          # GitHub Actions sets `bash -eo pipefail` by default, so any non-zero
          # exit from `timeout 30 kcov ...` (e.g., 124 on cap-hit) would abort
          # the whole step before our rc-check runs. Use `|| rc=$?` so the
          # exit is captured into rc and the loop can decide whether to warn
          # or continue. (Prior to this fix the previous kcov loop relied on
          # `|| echo WARN` for the same reason.)
          for sh in scanner/tests/test_*.sh; do
            name=$(basename "$sh" .sh)
            echo "::group::kcov $name"
            start=$(date +%s)
            rc=0
            # *_tty tests need stdin to be a pty slave so [[ -t 0 ]] returns
            # true inside the TTY-gated functions they exercise.
            # --exclude-pattern drops files whose *filename substring* collides
            # with the include pattern but are NOT the lib SUT: the pre-existing
            # check `scanner/checks/saas/api-checks.sh` and its test
            # `test_check_saas_api_checks.sh` both contain "checks.sh", so without
            # this exclude kcov would add their (mostly-SKIP) lines to the lib-only
            # denominator and crater the percentage (observed 92%->68.88%). All
            # other check files are already excluded simply by not matching.
            if [[ "$name" == *_tty ]]; then
              timeout 30 \
                python3 scanner/tests/pty_run.py \
                  kcov --include-pattern=checks.sh,checks_credentials.sh,output.sh,output_prowler.sh \
                    --exclude-pattern=api-checks.sh,api_checks.sh \
                    "kcov-out/$name" "$sh" \
                || rc=$?
            else
              timeout 30 \
                kcov --include-pattern=checks.sh,checks_credentials.sh,output.sh,output_prowler.sh \
                  --exclude-pattern=api-checks.sh,api_checks.sh \
                  "kcov-out/$name" "$sh" \
                || rc=$?
            fi
            elapsed=$(( $(date +%s) - start ))
            if [ "$rc" -eq 124 ]; then
              echo "::warning::kcov $name TIMED OUT after ${elapsed}s (>=30s cap)"
            elif [ "$rc" -ne 0 ]; then
              echo "WARN: $sh exited non-zero under kcov (rc=$rc, ${elapsed}s)"
            fi
            echo "kcov $name elapsed=${elapsed}s rc=${rc}"
            echo "::endgroup::"
          done
          kcov --merge kcov-out/merged kcov-out/*/
      - name: Print bash coverage summary
        run: |
          # kcov v42's --merge writes coverage.json into a nested subdir
          # (kcov-merged/ on current runners) rather than kcov-out/merged/
          # directly, so locate it with find. Fall back to any coverage.json
          # anywhere under kcov-out/ if the merge subdir ever changes names.
          cov_json=$(find kcov-out/merged -name coverage.json -print -quit 2>/dev/null || true)
          if [ -z "$cov_json" ]; then
            cov_json=$(find kcov-out -name coverage.json -print -quit 2>/dev/null || true)
          fi
          if [ -n "$cov_json" ] && [ -f "$cov_json" ]; then
            echo "Found merged coverage.json: $cov_json"
            pct=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); print(d.get('percent_covered','?'))" "$cov_json")
            echo "Bash coverage (merged): ${pct}%"
          else
            echo "WARN: no coverage.json found under kcov-out/"
            echo "Contents of kcov-out/merged/ (top two levels):"
            find kcov-out/merged -maxdepth 2 -print 2>/dev/null || true
          fi
      - name: Enforce bash coverage threshold (>=90%)
        run: |
          # Re-run the same find-based discovery as the summary step so this
          # gate is robust to kcov's nested merge subdir names.
          cov_json=$(find kcov-out/merged -name coverage.json -print -quit 2>/dev/null || true)
          if [ -z "$cov_json" ]; then
            cov_json=$(find kcov-out -name coverage.json -print -quit 2>/dev/null || true)
          fi
          if [ -z "$cov_json" ] || [ ! -f "$cov_json" ]; then
            echo "::error::No coverage.json found under kcov-out/; cannot enforce bash coverage threshold"
            exit 1
          fi
          python3 - "$cov_json" <<'PY'
          import json
          import sys

          # Floor raised from 85 -> 90 after PR #171/#173/#174 lifted SUT
          # coverage from 91.19% -> 92.36% (lib-only methodology). Current
          # safety margin: ~2.36pp.
          threshold = 90.0
          path = sys.argv[1]
          with open(path) as fh:
              data = json.load(fh)
          pct = float(data.get("percent_covered", 0.0))
          if pct < threshold:
              print(f"::error::Bash coverage {pct:.2f}% is below required threshold {threshold:.1f}%")
              sys.exit(1)
          print(f"Bash coverage {pct:.2f}% meets threshold {threshold:.1f}%. Bash coverage threshold met.")
          PY
      - name: Upload kcov merged report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: scanner-shell-kcov-${{ github.run_id }}
          path: kcov-out/merged/
          retention-days: 14
          if-no-files-found: ignore

  dashboard-regression-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.scanner == 'true' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - name: Build claudesec runtime image (cache enabled)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: Dockerfile
          tags: claudesec:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Check image size (max 600 MB)
        run: |
          size_bytes=$(docker image inspect claudesec:ci --format='{{.Size}}')
          size_mb=$(( size_bytes / 1024 / 1024 ))
          echo "Image size: ${size_mb} MB"
          # Locks in the ~513 MB image achieved by the prowler-provider
          # stripping in cycle #217-#237 (was 1.47 GB). 600 MB leaves ~17%
          # headroom for trivy/kubectl version bumps while still decisively
          # catching the ~700 MB regression of un-stripping a cloud provider.
          # Raising this back toward the old 1.8 GB is guarded by
          # scanner/tests/test_ci_docker_image_size_gate.py.
          max_mb=600
          if [ "$size_mb" -gt "$max_mb" ]; then
            echo "::error::Image size ${size_mb} MB exceeds limit ${max_mb} MB"
            exit 1
          fi
      - name: Verify container tooling (kubectl, prowler)
        run: |
          docker run --rm --entrypoint sh claudesec:ci -c 'kubectl version --client && prowler -v'
      - name: Smoke test prowler provider detection (_prowler_provider_available)
        # Guard against a future prowler package-layout change silently breaking
        # _prowler_install_dir detection (open risk flagged in #238).
        # We define _prowler_install_dir + _prowler_provider_available inline
        # (same body as integration.sh) rather than sourcing the whole file
        # (which has top-level side effects requiring has_command, skip, etc.).
        # aws must exit 0 (kept); azure must exit 1 (stripped).
        run: |
          docker run --rm --entrypoint bash claudesec:ci -c '
            set -euo pipefail
            _prowler_install_dir=$(python3 -c "import prowler,os;print(os.path.dirname(prowler.__file__))" 2>/dev/null || true)
            if [ -z "$_prowler_install_dir" ]; then
              echo "ERROR: could not resolve prowler install dir" >&2
              exit 1
            fi
            echo "Prowler install dir: $_prowler_install_dir"
            _prowler_provider_available() {
              local provider="$1"
              [ "$provider" = "nhn" ] && provider="openstack"
              [ -z "$_prowler_install_dir" ] && return 0
              [ -d "${_prowler_install_dir}/providers/${provider}" ]
            }
            echo "--- Checking kept provider: aws ---"
            if _prowler_provider_available aws; then
              echo "PASS: aws provider dir present (kept in lean image)"
            else
              echo "FAIL: aws provider dir missing — _prowler_install_dir detection broken" >&2
              exit 1
            fi
            echo "--- Checking stripped provider: azure ---"
            if _prowler_provider_available azure; then
              echo "FAIL: azure provider dir present — should have been stripped from lean image" >&2
              exit 1
            else
              echo "PASS: azure provider dir absent (stripped from lean image)"
            fi
          '
      - name: Verify non-root user
        run: |
          docker run --rm --entrypoint sh claudesec:ci -c 'test "$(id -u)" -ne 0'
      - name: Prepare isolated scan workspace
        run: |
          tmp_scan="$RUNNER_TEMP/claudesec-scan"
          mkdir -p "$tmp_scan"
          rsync -a --delete --exclude '.git' ./ "$tmp_scan"/
      - name: Docker quick dashboard generation (no-serve)
        timeout-minutes: 5
        run: ./scripts/run-dashboard-docker.sh --image claudesec:ci --scan-dir "$RUNNER_TEMP/claudesec-scan" --quick --no-serve --no-build
      - name: Docker full dashboard generation (no-serve)
        timeout-minutes: 8
        run: ./scripts/run-dashboard-docker.sh --image claudesec:ci --scan-dir "$RUNNER_TEMP/claudesec-scan" --no-serve --no-build
      - name: Validate dashboard file exists
        run: test -f "$RUNNER_TEMP/claudesec-scan/claudesec-dashboard.html"
      - name: Validate dashboard content
        run: grep -qi "ClaudeSec.*Security" "$RUNNER_TEMP/claudesec-scan/claudesec-dashboard.html"
      # Lighthouse audit removed: security-scan.yml::lighthouse already runs
      # the same audit against the same generated dashboard, and
      # lighthouse.yml audits the live deployed Pages. The previous lhci run
      # here was informational only (`--assert.assertions.categories:accessibility=off`
      # disabled the gate, and the trailing score check emitted ::warning::
      # rather than failing), so dropping it removes ~30s of npm install +
      # headless Chrome boot per Lint run without losing signal.

  pii-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check for PII and personal information
        run: |
          find . -type f \( -name '*.py' -o -name '*.sh' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.json' -o -name '*.html' -o -name '*.svg' \) \
            ! -path './node_modules/*' ! -path './.git/*' ! -path './package-lock.json' \
            ! -path './.claudesec-assets/*' ! -path './.claudesec-saas-best-practices/*' \
            -print0 | xargs -0 bash hooks/pii-check.sh

  workflow-fork-guard:
    # Regression-prevention: every job in a pull_request_target workflow must
    # carry a head.repo.full_name == github.repository fork-guard (OWASP A08).
    # The audit script exits 1 on any unguarded job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.1.0
        with:
          python-version: "3.13"
      - name: Install PyYAML
        run: pip install --no-deps 'pyyaml>=6.0,<7'
      - name: Audit pull_request_target workflows for fork-guard
        run: python3 scripts/check-pull-request-target-guard.py

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      # Shallow checkout (default fetch-depth: 1) is sufficient because the
      # `gitleaks dir` invocation below scans the filesystem only — `gitleaks
      # dir --help` confirms it takes "[path]" and walks files. The history-
      # scanning subcommand `gitleaks git` is intentionally not used here;
      # full history checkout was a leftover from the gitleaks-action era.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      # gitleaks/gitleaks-action v2.3.9 (latest) still runs on node20, and the
      # upstream node24 migration (gitleaks/gitleaks-action#215) was still open
      # as of 2026-05-19. To stay clear of the 2026-06-02 node20 deprecation we
      # invoke the gitleaks CLI directly. The local pre-commit gitleaks hook
      # and GitGuardian still cover the PR-comment path that the action used to
      # provide.
      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.30.1"
          # https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_checksums.txt
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          rm gitleaks.tar.gz
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        # Scans the working tree (matches the previous action's PR/push semantics).
        # `gitleaks dir` is the v8.20+ replacement for the legacy `detect --no-git`.
        run: |
          gitleaks dir . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --exit-code 1 \
            --verbose

  frontmatter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check YAML frontmatter in docs
        # Uses find -print0 + while-read with process substitution to avoid
        # the shellcheck SC2044 fragile-for-loop pattern. Process substitution
        # keeps the while loop in the parent shell so `failed=1` propagates
        # (a pipeline `find | while read` would put the loop in a subshell
        # and lose the flag).
        run: |
          failed=0
          while IFS= read -r -d '' f; do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::Missing YAML frontmatter"
              failed=1
            fi
          done < <(find docs -name '*.md' -not -path '*/node_modules/*' -print0)
          if [ "$failed" -eq 1 ]; then
            echo "::error::Some docs files are missing YAML frontmatter (title, description, tags)"
            exit 1
          fi
          echo "All docs files have YAML frontmatter"

  docker-dashboard-smoke:
    name: Docker Dashboard Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: changes
    if: >-
      (github.event_name == 'push' || github.event_name == 'pull_request')
      && (needs.changes.outputs.docker == 'true' || needs.changes.outputs.scanner == 'true')

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Create placeholder dashboard files
        run: |
          echo '<!DOCTYPE html><html><head><title>ClaudeSec Security Dashboard</title></head><body><h1>ClaudeSec Dashboard</h1></body></html>' \
            > claudesec-dashboard.html
          echo '{"version":"1.0","findings":[],"generated_at":"2024-01-01T00:00:00Z"}' \
            > scan-report.json
          mkdir -p .claudesec-assets

      - name: Build dashboard image
        run: docker compose build dashboard

      - name: Start dashboard container
        run: docker compose up -d dashboard

      - name: Wait for healthcheck to pass
        run: |
          timeout=60
          elapsed=0
          until curl -sf http://localhost:11777/ > /dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "::error::Dashboard did not become healthy within ${timeout}s"
              docker compose logs dashboard
              exit 1
            fi
            sleep 3
            elapsed=$(( elapsed + 3 ))
          done
          echo "Dashboard is healthy after ${elapsed}s"

      - name: Verify HTTP 200 on key endpoints
        run: |
          for endpoint in "/" "/scan.html" "/scan-report.json"; do
            status=$(curl -o /dev/null -sw '%{http_code}' "http://localhost:11777${endpoint}")
            if [ "$status" != "200" ]; then
              echo "::error::Expected HTTP 200 on ${endpoint}, got ${status}"
              docker compose logs dashboard
              exit 1
            fi
            echo "OK ${endpoint} -> ${status}"
          done

      - name: Clean up
        if: always()
        run: docker compose down

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25  # v24.0.0
        with:
          globs: |
            **/*.md
            !.claude/**

  link-check:
    # lychee scans *.md link validity. If no markdown changed, nothing new
    # to verify — gate on the `markdown` bucket so docs-untouched PRs skip
    # the external HTTP fetches entirely. Scheduled runs always execute so
    # link rot from external URLs is still caught on a cadence.
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.markdown == 'true' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          # Exclude allowlist lives in lychee.toml (single source of truth,
          # guarded by scanner/tests/test_ci_lychee_config.py) so it cannot
          # drift from a second inline copy. Only operational flags stay here.
          args: >-
            --config lychee.toml
            --no-progress
            --accept '100..=599'
            --timeout 20
            '**/*.md'
          fail: true
          # PIN TO v0.23.0 — do not bump without verifying the lychee-action
          # install path end-to-end (not just the asset filename). The v0.24.x
          # tarballs nest the binary inside a `lychee-<triple>/` subdirectory
          # (alongside complete/ and docs/), but the pinned lychee-action SHA's
          # installer expects the binary at the archive root and runs
          # `install ... /tmp/lychee-download/lychee` → `install: cannot stat`
          # (PR #204 regressed this; reverted in #209). Upstream lychee-action
          # itself still defaults lycheeVersion to v0.23.0 for the same reason.
          # (v0.24.0 additionally had a one-off asset-filename break, fixed in
          # v0.24.1 — but the nested-binary layout still breaks the installer.)
          lycheeVersion: v0.23.0

  lint-gate:
    name: Lint
    if: always()
    needs:
      - changes
      - dependency-review
      - npm-audit
      - pip-audit
      - shell-lint
      - scanner-unit-tests
      - scanner-shell-coverage
      - dashboard-regression-check
      - pii-check
      - gitleaks
      - frontmatter-check
      - docker-dashboard-smoke
      - markdown-lint
      - link-check
      - workflow-fork-guard
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate lint workflow results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if bad:
              print(f"Lint gate failed: {bad}")
              sys.exit(1)
          print("Lint gate passed.")
          PY
