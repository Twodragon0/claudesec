name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Dependency Review
        # NOTE: actions/dependency-review-action v4.9.0 (SHA 2031cfc) still uses node20.
        # Monitor upstream for a node24 release and upgrade when available.
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'
          cache: 'npm'
      - name: npm audit
        run: npm audit --audit-level=high

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
      - name: Install pip-audit and project dependencies
        run: |
          python3 -m pip install --upgrade pip-audit
          python3 -m pip install -r requirements-ci.txt
      - name: Run pip-audit
        # CVE-2026-4539: pygments <=2.19.2 local ReDoS — no fix available yet
        run: pip-audit --strict --desc --ignore-vuln CVE-2026-4539

  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run ShellCheck (pinned action + pinned engine version)
        # NOTE: ludeeus/action-shellcheck@00cae500 still uses node20 (deprecated June 2, 2026).
        # Latest upstream release (2.0.0) has no node24 update yet; upgrade when available.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        env:
          SHELLCHECK_OPTS: -x
        with:
          version: v0.11.0
          severity: error
          scandir: '.'
          ignore_paths: >-
            node_modules
            .venv*
            docs
            templates
            examples
            assets
            .claude
            .github
          additional_files: run
          check_together: 'yes'

  scanner-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-ci.txt
      - name: Install Python test deps
        run: python3 -m pip install --upgrade -r requirements-ci.txt
      - name: Run bash unit tests (kubeconfig discovery, OIDC detection)
        run: bash scanner/tests/test_kube_discovery.sh
      - name: Run bash unit tests (output.sh functions)
        run: bash scanner/tests/test_output_functions.sh
      - name: Run bash unit tests (infra/docker checks)
        run: bash scanner/tests/test_check_infra_docker.sh
      - name: Run bash unit tests (code/injection checks)
        run: bash scanner/tests/test_check_code_injection.sh
      - name: Run bash unit tests (access-control checks)
        run: bash scanner/tests/test_check_access_control.sh
      - name: Run bash unit tests (network/tls checks)
        run: bash scanner/tests/test_check_network_tls.sh
      - name: Run bash unit tests (cicd/pipeline checks)
        run: bash scanner/tests/test_check_cicd_pipeline.sh
      - name: Run scanner pytest + coverage gate (>=95%)
        id: scanner_tests
        env:
          PYTHONPATH: .
          CLAUDESEC_DASHBOARD_OFFLINE: "1"
        run: |
          python3 -m py_compile scanner/lib/dashboard-gen.py scanner/lib/compliance-map.py scanner/tests/test_dashboard_gen_smoke.py scanner/tests/test_markdown_preview.py scanner/tests/test_prowler_ocsf.py scanner/tests/test_prowler_ocsf_e2e.py scanner/tests/test_compliance_map.py
          mkdir -p test-reports
          set +e
          python3 -m pytest scanner/tests/ \
            --junitxml=test-reports/pytest-junit.xml \
            --cov=scanner/lib \
            --cov-report=term \
            --cov-report=xml:test-reports/coverage.xml \
            --cov-fail-under=95 \
            -q
          test_exit_code=$?
          echo "test_exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish scanner unittest report
        if: always()
        uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4  # v6.3.1
        with:
          report_paths: 'test-reports/*.xml'
          fail_on_failure: false
          require_tests: false
      - name: Upload scanner unittest + coverage artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: scanner-unit-test-xml-${{ github.run_id }}
          path: test-reports/*.xml
          retention-days: 14
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        continue-on-error: true
        with:
          files: test-reports/coverage.xml
          flags: scanner-lib
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Fail workflow on scanner unittest / coverage failure
        if: always() && steps.scanner_tests.outputs.test_exit_code != '0'
        run: |
          echo "scanner-unit-tests failed (or coverage below 90%) with exit code ${{ steps.scanner_tests.outputs.test_exit_code }}"
          exit 1

  scanner-shell-coverage:
    # ubuntu-22.04: kcov still ships in jammy's default apt repos. On
    # ubuntu-24.04 (noble, the current `ubuntu-latest`) kcov was dropped,
    # so apt-get install fails. Pin to 22.04 for this informational job
    # instead of building kcov from source.
    runs-on: ubuntu-22.04
    needs: scanner-unit-tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install kcov
        run: |
          sudo apt-get update
          sudo apt-get install -y kcov
      - name: Run scanner shell tests under kcov
        run: |
          mkdir -p kcov-out
          # The bash unit tests source `$LIB_DIR/checks.sh` and
          # `$LIB_DIR/output.sh` from scanner/lib, so we need kcov to
          # instrument that directory. Previous attempts with
          # --include-pattern matched zero files (0% coverage reported);
          # --include-path with the absolute repo path is more reliable
          # because kcov records sourced files as absolute paths.
          # Also drop --bash-method=DEBUG so kcov picks the default tracer
          # that handles `source` correctly in recent jammy kcov builds.
          LIB_ABS="$(pwd)/scanner/lib"
          echo "kcov include-path: $LIB_ABS"
          for sh in scanner/tests/test_*.sh; do
            name=$(basename "$sh" .sh)
            kcov --include-path="$LIB_ABS" \
              "kcov-out/$name" bash "$sh" \
              || echo "WARN: $sh exited non-zero under kcov"
          done
          kcov --merge kcov-out/merged kcov-out/*/
      - name: Print bash coverage summary
        run: |
          if [ -f kcov-out/merged/coverage.json ]; then
            pct=$(python3 -c "import json; d=json.load(open('kcov-out/merged/coverage.json')); print(d.get('percent_covered','?'))")
            echo "Bash coverage (merged): ${pct}%"
          else
            echo "WARN: kcov merged coverage.json not found"
            ls -la kcov-out/merged/ || true
          fi
      - name: Upload kcov merged report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: scanner-shell-kcov-${{ github.run_id }}
          path: kcov-out/merged/
          retention-days: 14
          if-no-files-found: ignore

  dashboard-regression-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: Build claudesec runtime image (cache enabled)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: Dockerfile
          tags: claudesec:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Check image size (max 1.8 GB)
        run: |
          size_bytes=$(docker image inspect claudesec:ci --format='{{.Size}}')
          size_mb=$(( size_bytes / 1024 / 1024 ))
          echo "Image size: ${size_mb} MB"
          max_mb=1843
          if [ "$size_mb" -gt "$max_mb" ]; then
            echo "::error::Image size ${size_mb} MB exceeds limit ${max_mb} MB"
            exit 1
          fi
      - name: Verify container tooling (kubectl, prowler)
        run: |
          docker run --rm --entrypoint sh claudesec:ci -c 'kubectl version --client && prowler -v'
      - name: Verify non-root user
        run: |
          docker run --rm --entrypoint sh claudesec:ci -c 'test "$(id -u)" -ne 0'
      - name: Prepare isolated scan workspace
        run: |
          tmp_scan="$RUNNER_TEMP/claudesec-scan"
          mkdir -p "$tmp_scan"
          rsync -a --delete --exclude '.git' ./ "$tmp_scan"/
      - name: Docker quick dashboard generation (no-serve)
        timeout-minutes: 5
        run: ./scripts/run-dashboard-docker.sh --image claudesec:ci --scan-dir "$RUNNER_TEMP/claudesec-scan" --quick --no-serve --no-build
      - name: Docker full dashboard generation (no-serve)
        timeout-minutes: 8
        run: ./scripts/run-dashboard-docker.sh --image claudesec:ci --scan-dir "$RUNNER_TEMP/claudesec-scan" --no-serve --no-build
      - name: Validate dashboard file exists
        run: test -f "$RUNNER_TEMP/claudesec-scan/claudesec-dashboard.html"
      - name: Validate dashboard content
        run: grep -qi "ClaudeSec.*Security" "$RUNNER_TEMP/claudesec-scan/claudesec-dashboard.html"
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x
      - name: Run Lighthouse accessibility audit
        run: |
          cd "$RUNNER_TEMP/claudesec-scan"
          lhci autorun --collect.staticDistDir=. \
            --collect.url=claudesec-dashboard.html \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:accessibility=off \
            --upload.target=temporary-public-storage || true
      - name: Check Lighthouse accessibility score
        run: |
          cd "$RUNNER_TEMP/claudesec-scan"
          if [ -d ".lighthouseci" ]; then
            score=$(node -e "
              const fs = require('fs');
              const files = fs.readdirSync('.lighthouseci').filter(f => f.endsWith('.json') && f.startsWith('lhr-'));
              if (files.length) {
                const lhr = JSON.parse(fs.readFileSync('.lighthouseci/' + files[0]));
                console.log(Math.round(lhr.categories.accessibility.score * 100));
              } else { console.log(0); }
            ")
            echo "Accessibility score: $score"
            if [ "$score" -lt 90 ]; then
              echo "::warning::Lighthouse accessibility score $score is below 90"
            fi
          fi

  pii-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check for PII and personal information
        run: |
          find . -type f \( -name '*.py' -o -name '*.sh' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.json' -o -name '*.html' -o -name '*.svg' \) \
            ! -path './node_modules/*' ! -path './.git/*' ! -path './package-lock.json' \
            ! -path './.claudesec-assets/*' ! -path './.claudesec-saas-best-practices/*' \
            -print0 | xargs -0 bash hooks/pii-check.sh

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # NOTE: gitleaks-action v2.3.9 still uses node20 (deprecated by GitHub June 2, 2026).
        # Upstream tracking issue: https://github.com/gitleaks/gitleaks-action/issues
        # Upgrade to node24 version when released by upstream.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontmatter-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check YAML frontmatter in docs
        run: |
          failed=0
          for f in $(find docs -name '*.md' -not -path '*/node_modules/*'); do
            if ! head -1 "$f" | grep -q '^---$'; then
              echo "::error file=$f::Missing YAML frontmatter"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::Some docs files are missing YAML frontmatter (title, description, tags)"
            exit 1
          fi
          echo "All docs files have YAML frontmatter"

  docker-dashboard-smoke:
    name: Docker Dashboard Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create placeholder dashboard files
        run: |
          echo '<!DOCTYPE html><html><head><title>ClaudeSec Security Dashboard</title></head><body><h1>ClaudeSec Dashboard</h1></body></html>' \
            > claudesec-dashboard.html
          echo '{"version":"1.0","findings":[],"generated_at":"2024-01-01T00:00:00Z"}' \
            > scan-report.json
          mkdir -p .claudesec-assets

      - name: Build dashboard image
        run: docker compose build dashboard

      - name: Start dashboard container
        run: docker compose up -d dashboard

      - name: Wait for healthcheck to pass
        run: |
          timeout=60
          elapsed=0
          until curl -sf http://localhost:11777/ > /dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "::error::Dashboard did not become healthy within ${timeout}s"
              docker compose logs dashboard
              exit 1
            fi
            sleep 3
            elapsed=$(( elapsed + 3 ))
          done
          echo "Dashboard is healthy after ${elapsed}s"

      - name: Verify HTTP 200 on key endpoints
        run: |
          for endpoint in "/" "/scan.html" "/scan-report.json"; do
            status=$(curl -o /dev/null -sw '%{http_code}' "http://localhost:11777${endpoint}")
            if [ "$status" != "200" ]; then
              echo "::error::Expected HTTP 200 on ${endpoint}, got ${status}"
              docker compose logs dashboard
              exit 1
            fi
            echo "OK ${endpoint} -> ${status}"
          done

      - name: Clean up
        if: always()
        run: docker compose down

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23
        with:
          globs: |
            **/*.md
            !.claude/**

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --exclude 'isms.kisa.or.kr'
            --exclude 'isms-p.or.kr'
            --exclude 'privacy.go.kr'
            --exclude 'law.go.kr'
            --exclude 'pipc.go.kr'
            --exclude 'atlas.mitre.org'
            --exclude 'airc.nist.gov'
            --exclude 'media.defense.gov'
            --exclude 'jamf.com'
            --exclude 'byline.network'
            --exclude 'kyverno.io'
            --exclude 'falco.org'
            --exclude 'contributor-covenant.org'
            --exclude 'conventionalcommits.org'
            --exclude 'github.com/Twodragon0/claudesec/discussions'
            --exclude 'scorecard.dev'
            --exclude 'securityscorecards.dev'
            --exclude 'in-toto.io'
            --exclude 'sigstore.dev'
            --exclude 'localhost'
            --accept '100..=599'
            --timeout 20
            '**/*.md'
          fail: true
          lycheeVersion: latest

  lint-gate:
    name: Lint
    if: always()
    needs:
      - dependency-review
      - npm-audit
      - pip-audit
      - shell-lint
      - scanner-unit-tests
      - dashboard-regression-check
      - pii-check
      - gitleaks
      - frontmatter-check
      - docker-dashboard-smoke
      - markdown-lint
      - link-check
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate lint workflow results
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          bad = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in ("success", "skipped")
          }
          if bad:
              print(f"Lint gate failed: {bad}")
              sys.exit(1)
          print("Lint gate passed.")
          PY
