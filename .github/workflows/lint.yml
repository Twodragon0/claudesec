name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Run ShellCheck (pinned action + pinned engine version)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        env:
          SHELLCHECK_OPTS: -x
        with:
          version: v0.11.0
          severity: warning
          scandir: ./scripts
          additional_files: run
          check_together: 'yes'

  scanner-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'
      - name: Install XML test reporter
        run: python3 -m pip install --upgrade unittest-xml-reporting
      - name: Run scanner unittest baseline (JUnit XML)
        id: scanner_tests
        env:
          PYTHONPATH: .
        run: |
          python3 -m py_compile scanner/lib/dashboard-gen.py scanner/tests/test_dashboard_gen_smoke.py
          set +e
          python3 -m xmlrunner discover -s scanner/tests -p "test_*.py" -o test-reports
          test_exit_code=$?
          echo "test_exit_code=$test_exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish scanner unittest report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'test-reports/*.xml'
          fail_on_failure: false
          require_tests: false
      - name: Upload scanner unittest XML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-unit-test-xml-${{ github.run_id }}
          path: test-reports/*.xml
          retention-days: 14
          if-no-files-found: ignore
      - name: Fail workflow on scanner unittest failure
        if: always() && steps.scanner_tests.outputs.test_exit_code != '0'
        run: |
          echo "scanner-unit-tests failed with exit code ${{ steps.scanner_tests.outputs.test_exit_code }}"
          exit 1

  dashboard-regression-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build claudesec runtime image (cache enabled)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: claudesec:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Docker quick dashboard generation (no-serve)
        run: ./scripts/run-dashboard-docker.sh --image claudesec:ci --quick --no-serve --no-build
      - name: Docker full dashboard generation (no-serve)
        run: ./scripts/run-dashboard-docker.sh --image claudesec:ci --no-serve --no-build
      - name: Validate dashboard file exists
        run: test -f claudesec-dashboard.html
      - name: Validate dashboard content
        run: grep -q "ClaudeSec local security scanner results" claudesec-dashboard.html

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101
        with:
          globs: "**/*.md"

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --exclude 'isms.kisa.or.kr'
            --exclude 'isms-p.or.kr'
            --exclude 'privacy.go.kr'
            --exclude 'law.go.kr'
            --exclude 'atlas.mitre.org'
            --exclude 'airc.nist.gov'
            --exclude 'media.defense.gov'
            --exclude 'jamf.com'
            --exclude 'kyverno.io'
            --exclude 'contributor-covenant.org'
            --exclude 'conventionalcommits.org'
            --exclude 'github.com/Twodragon0/claudesec/discussions'
            --exclude 'scorecard.dev'
            --exclude 'securityscorecards.dev'
            --exclude 'in-toto.io'
            --exclude 'sigstore.dev'
            --accept '100..=599'
            --timeout 20
            '**/*.md'
          fail: true
          lycheeVersion: latest
