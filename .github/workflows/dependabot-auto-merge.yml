name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    name: Auto-merge Dependabot PR
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267b607587a0b2e5fa28af56a5c06c5ec2f3d7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve patch update
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review "$PR_URL" --approve --body "Auto-approving patch update from Dependabot."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve minor update
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr review "$PR_URL" --approve --body "Auto-approving minor update from Dependabot."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve major update (no merge)
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: gh pr review "$PR_URL" --approve --body "Auto-approving major update from Dependabot — manual merge required due to potential breaking changes."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge patch update
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge "$PR_URL" --squash --auto
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge minor update
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge "$PR_URL" --squash --auto
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
