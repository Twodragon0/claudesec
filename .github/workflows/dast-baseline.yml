name: DAST Baseline Scan

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL for DAST scan (default: docker-compose app)"
        required: false
        default: "http://localhost:8080"

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  dast-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start application (docker-compose)
        if: env.APP_IMAGE != ''
        run: |
          docker compose -f docker-compose.staging.yml up -d
          timeout 60 bash -c 'until curl -sf ${{ inputs.target_url || 'http://localhost:8080' }}/health; do sleep 2; done'

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ inputs.target_url || 'http://localhost:8080' }}
          rules_file_name: "templates/zap-rules.tsv"
          cmd_options: "-a"
          fail_action: true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-report
          path: report_html.html
          retention-days: 30

      - name: Teardown
        if: always() && env.APP_IMAGE != ''
        run: docker compose -f docker-compose.staging.yml down
