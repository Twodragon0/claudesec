name: DAST Full Scan (Nightly)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL for DAST scan"
        required: true
        default: "https://staging.example.com"

permissions:
  contents: read
  issues: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dast-full:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@3c58388149901b9a03b7718852c5ba889646c27c  # v0.13.0
        id: zap
        continue-on-error: true
        with:
          target: ${{ github.event.inputs.target_url || 'https://staging.example.com' }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: >-
            -z "-config scanner.maxScanDurationInMins=30"
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: "ZAP Full Scan Report"
          artifact_name: "zap-full-scan-report"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: zap-full-scan-results
          path: |
            report_html.html
            report_json.json
            zap_scan.sarif
          if-no-files-found: ignore

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('zap_scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          sarif_file: zap_scan.sarif
          category: "DAST"

      - name: Notify on Critical Findings
        if: steps.zap.outcome == 'failure'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[DAST] Critical vulnerability detected - ' + new Date().toISOString().split('T')[0],
              labels: ['security', 'dast', 'critical'],
              body: 'DAST Full Scan found critical vulnerabilities. Check workflow artifacts for details.'
            })
