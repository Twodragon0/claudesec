name: DAST Full Scan (Nightly)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL for DAST scan"
        required: true
        default: "https://staging.example.com"

permissions:
  contents: read
  issues: write
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dast-full:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@v0.14.0
        id: zap
        continue-on-error: true
        with:
          target: ${{ github.event.inputs.target_url || 'https://staging.example.com' }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: >-
            -z "-config scanner.maxScanDurationInMins=30"
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: "ZAP Full Scan Report"
          artifact_name: "zap-full-scan-report"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: zap-full-scan-results
          path: |
            report_html.html
            report_json.json
            zap_scan.sarif
          if-no-files-found: ignore

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('zap_scan.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap_scan.sarif
          category: "DAST"

      - name: Notify on Critical Findings
        if: steps.zap.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[DAST] Critical vulnerability detected - ' + new Date().toISOString().split('T')[0],
              labels: ['security', 'dast', 'critical'],
              body: 'DAST Full Scan found critical vulnerabilities. Check workflow artifacts for details.'
            })
