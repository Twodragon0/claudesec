# npm Publish with Trusted Publishers (Provenance)
#
# Tokenless publish via GitHub Actions OIDC + SLSA provenance. No NPM_TOKEN
# secret is used — authentication is the short-lived OIDC token exchanged with
# npm's trusted-publisher flow.
#
# One-time setup (npmjs.com side):
#   1. npmjs.com -> package "claudesec" -> Settings -> Trusted Publishers ->
#      Add GitHub Actions:
#        Owner:       Twodragon0
#        Repository:  claudesec
#        Workflow:    npm-publish.yml
#        Environment: npm-publish
#   2. GitHub -> Settings -> Environments -> create "npm-publish"
#
# Auto-release:
#   - Push a package.json version bump to `main`  -> publishes the new version
#     and creates the matching vX.Y.Z tag automatically.
#   - Push a `v*` tag                              -> publishes that version.
#   - Manual workflow_dispatch (optional dry_run)  -> publishes current version.
#
# Publishing is idempotent: a version already present on npm is skipped (the
# job runs a --dry-run instead), so re-runs and unrelated main pushes are safe.
#
# OIDC trusted publishing requires npm >= 11.5.1. Node 22 bundles npm 10.x, so
# the publish job upgrades npm before publishing.

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  detect:
    name: Detect release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_publish: ${{ steps.v.outputs.should_publish }}
      already_published: ${{ steps.v.outputs.already_published }}
      dry_run: ${{ steps.v.outputs.dry_run }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Resolve version and publish decision
        id: v
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

          DRY="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] \
             && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY="true"
          fi
          echo "dry_run=$DRY" >> "$GITHUB_OUTPUT"

          if npm view "claudesec@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "::notice::claudesec@$PKG_VERSION already on npm — nothing to publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "::notice::claudesec@$PKG_VERSION not on npm — will publish."
          fi

          echo "Resolved claudesec@$PKG_VERSION (event=${{ github.event_name }}, ref=${{ github.ref }}, dry_run=$DRY)"

  test:
    name: Test
    needs: detect
    if: needs.detect.outputs.should_publish == 'true' || needs.detect.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Verify CLI
        run: |
          chmod +x bin/claudesec-cli.sh
          ./bin/claudesec-cli.sh version
          ./bin/claudesec-cli.sh help

      - name: Verify package.json
        run: |
          node -e "const p = require('./package.json'); console.log(p.name + '@' + p.version)"

      - name: Run scanner smoke test
        run: |
          chmod +x scanner/claudesec
          ./scanner/claudesec version

  publish:
    name: Publish
    needs: [detect, test]
    if: needs.detect.outputs.should_publish == 'true' || needs.detect.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write  # create the vX.Y.Z release tag after a successful publish
      id-token: write  # required for npm provenance / OIDC trusted publishing

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC trusted publishing (requires >= 11.5.1)
        # Pin the floor explicitly so the OIDC requirement is visible + guarded
        # (test_ci_npm_oidc_floor.py). Quote only the range so `>` is not a shell
        # redirect; `npm@'>=11.5.1'` resolves to the highest matching (= latest).
        run: npm install -g npm@'>=11.5.1'

      - name: Publish (dry run)
        if: needs.detect.outputs.dry_run == 'true' || needs.detect.outputs.already_published == 'true'
        run: npm publish --access public --provenance --dry-run

      - name: Publish
        if: needs.detect.outputs.dry_run == 'false' && needs.detect.outputs.already_published == 'false'
        run: npm publish --access public --provenance

      - name: Tag release vX.Y.Z
        if: >-
          needs.detect.outputs.dry_run == 'false'
          && needs.detect.outputs.already_published == 'false'
          && github.ref != format('refs/tags/v{0}', needs.detect.outputs.version)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping tag creation."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag v$VERSION"
          fi

      - name: Summary
        run: |
          {
            echo "## 📦 claudesec@${{ needs.detect.outputs.version }}"
            echo ""
            if [ "${{ needs.detect.outputs.dry_run }}" = "true" ] || [ "${{ needs.detect.outputs.already_published }}" = "true" ]; then
              echo "- Mode: **dry-run** (no publish)"
            else
              echo "- Mode: **published** ✅"
              echo "- Tag: \`v${{ needs.detect.outputs.version }}\`"
            fi
            echo "- npm: https://www.npmjs.com/package/claudesec"
            echo "- Provenance: ✅ SLSA attestation (OIDC trusted publisher)"
            echo "- Install: \`npx claudesec scan\`"
          } >> "$GITHUB_STEP_SUMMARY"
