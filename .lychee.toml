# Lychee link checker configuration
# https://lychee.cli.rs/configuration/

# Exclude URLs that are known to block CI crawlers or are unreliable
exclude = [
  # Korean government sites — SSL issues in CI
  "isms.kisa.or.kr",
  "isms-p.or.kr",
  "privacy.go.kr",
  "law.go.kr",
  # Sites that block bots (403/timeout/connection reset)
  "media.defense.gov",
  "jamf.com",
  "kyverno.io",
  "contributor-covenant.org",
  "conventionalcommits.org",
  # GitHub features not yet enabled
  "github.com/Twodragon0/claudesec/discussions",
  # MITRE ATLAS — URL structure changed
  "atlas.mitre.org",
  # NIST AI — URL structure varies
  "airc.nist.gov",
  # Local file references
  "file://",
]

# Accept 403 and 429 status codes (rate limiting / bot blocking)
accept = [403, 429]

# Timeout per request
timeout = 20

# Max retries
max_retries = 2

# Skip fragments (anchors) to avoid false positives
include_fragments = false
