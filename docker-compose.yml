# ClaudeSec — Docker Compose
#
# Usage:
#   docker compose up -d dashboard     — Serve dashboards at localhost:11777
#   docker compose --profile scan up   — Run scan + serve dashboard
#
# Build: docker compose build

services:

  scanner:
    build: { context: ., dockerfile: Dockerfile }
    image: claudesec:local
    command: ["scan", "-d", "/workspace", "-c", "all"]
    volumes: [".:/workspace"]
    working_dir: /workspace
    profiles: [scan]

  dashboard:
    build: { context: ., dockerfile: Dockerfile.nginx }
    image: claudesec-dashboard:local
    ports: ["11777:8080"]
    volumes:
      - ./claudesec-asset-dashboard-live.html:/usr/share/nginx/html/index.html:ro
      - ./claudesec-dashboard.html:/usr/share/nginx/html/scan.html:ro
      - ${CLAUDESEC_SCAN_REPORT:-./scan-report.json}:/usr/share/nginx/html/scan-report.json:ro
      - ./.claudesec-assets:/usr/share/nginx/html/.claudesec-assets:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    depends_on:
      scanner: { condition: service_completed_successfully, required: false }
