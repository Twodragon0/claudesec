# ClaudeSec — Docker Compose
#
# Usage:
#   docker compose up -d dashboard     — Serve dashboards at localhost:11777
#   docker compose --profile scan up   — Run scan + serve dashboard
#
# Build: docker compose build
#
# File requirements for the dashboard service:
#   REQUIRED (generated by `scanner scan`):
#     - claudesec-dashboard.html        — scan dashboard (mounted at /scan.html)
#     - scan-report.json                — scan results (overridable via CLAUDESEC_SCAN_REPORT)
#     - claudesec-asset-dashboard.html  — PDCA / ISMS main dashboard (static, checked in)
#   OPTIONAL (populated by external-API scripts, safe to be absent/empty):
#     - .claudesec-assets/              — asset sync output; an empty dir is fine
# Routing:
#   /            → PDCA dashboard (claudesec-asset-dashboard.html)  [main per user feedback]
#   /scan.html   → scan dashboard (claudesec-dashboard.html)
#   /scan-report.json — live scan data (falls back to scan-report.default.json)

services:

  scanner:
    build: { context: ., dockerfile: Dockerfile }
    image: claudesec:local
    command: ["scan", "-d", "/workspace", "-c", "all"]
    volumes: [".:/workspace"]
    working_dir: /workspace
    profiles: [scan]
    # Hardening: a local file scanner needs no Linux capabilities and must not
    # gain privileges. (Root FS stays writable — the scan writes scan-report.json
    # and .claudesec-* under the mounted workspace; opt-in network raw scans are
    # off by default.)
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]

  dashboard:
    build: { context: ., dockerfile: Dockerfile.nginx }
    image: claudesec-dashboard:local
    ports: ["11777:8080"]
    volumes:
      # PDCA / ISMS main dashboard — always mounted so `/` shows the right page.
      # Uses the checked-in static file; the live variant is built by scripts/build-dashboard.py
      # when API keys are present (see docker-compose.quickstart.yml for that flow).
      - ./claudesec-asset-dashboard.html:/usr/share/nginx/html/index.html:ro
      # Required: produced by running a scan
      - ./claudesec-dashboard.html:/usr/share/nginx/html/scan.html:ro
      - ${CLAUDESEC_SCAN_REPORT:-./scan-report.json}:/usr/share/nginx/html/scan-report.json:ro
      # Optional: populated by asset-sync scripts that need external APIs.
      # Mount an empty directory on fresh clones — nginx serves static assets fine without content.
      - ./.claudesec-assets:/usr/share/nginx/html/.claudesec-assets:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    # Container hardening (CIS Docker Benchmark). Serves static content only, so
    # a read-only root filesystem is safe — nginx's writable paths are backed by
    # tmpfs. Runs unprivileged (USER nginx, port 8080) with all Linux
    # capabilities dropped and privilege escalation disabled.
    read_only: true
    # mode=1777 so the unprivileged nginx user can create its runtime dirs
    # (e.g. /var/cache/nginx/client_temp, /run/nginx.pid) on the empty tmpfs.
    tmpfs:
      - /var/cache/nginx:mode=1777
      - /run:mode=1777
      - /tmp:mode=1777
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    mem_limit: 128m
    pids_limit: 100
    depends_on:
      scanner: { condition: service_completed_successfully, required: false }
