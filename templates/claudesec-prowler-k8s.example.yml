# ClaudeSec — Prowler with Kubernetes scan
# Copy to project root as .claudesec.yml to use a specific kubeconfig and AWS profile.
# .claudesec.yml is gitignored — do not commit paths that contain company names,
# personal folders, or other identifying information.
#
# Kubeconfig: use a path relative to the project (e.g. configs/dev/kubeconfig) so
# the repo stays portable. If omitted, ClaudeSec auto-discovers from conventional
# paths: configs/dev/kubeconfig, configs/staging/kubeconfig, ./kubeconfig.
# If your kubeconfig uses OIDC (e.g. kubectl oidc-login), run `kubectl get nodes`
# once to complete browser sign-in, then run claudesec.
#
# Usage:
#   cp templates/claudesec-prowler-k8s.example.yml .claudesec.yml
#   Optional: set kubeconfig to a relative path (e.g. configs/dev/kubeconfig).
#
#   ./scanner/claudesec scan -c prowler
#   ./scanner/claudesec dashboard -c prowler --serve
#
# CLI overrides: --kubeconfig / --aws-profile take precedence over this file.

version: "0.1"

scan:
  severity: medium

# Prowler / K8s — relative path preferred (resolved from project root). Omit to use auto-discovery.
# kubeconfig: configs/dev/kubeconfig
kubeconfig: ~/.kube/config
# AWS profile from ~/.aws/credentials (e.g. default, or a named profile)
aws_profile: default
aws_sso: all
aws_sso_login_timeout: 90
