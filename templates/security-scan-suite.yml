# .github/workflows/security-scan-suite.yml
# ClaudeSec template — popular GitHub security scanners (SARIF → Security > Code scanning)
#
# Tools:
# - CodeQL (SAST)
# - Semgrep CE (SAST)
# - Trivy (SCA + IaC + secrets (optional))
# - Gitleaks (secrets scanning)
# - OSV-Scanner (dependency vulnerability scanning)
#
# Notes:
# - Keep `permissions.security-events: write` to upload SARIF.
# - If you use GitHub Advanced Security features (secret scanning), you can disable Gitleaks.

name: "Security Scan Suite"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 2" # Weekly Tue 06:17 UTC (change to a random time)
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

env:
  DD_SERVICE: security-scan-suite
  DD_ENV: ci
  CI_PIPELINE_ID: ${{ github.run_id }}

jobs:
  token_expiry_gate:
    name: Token Expiry Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OAuth token expiry gate script
        uses: ./.github/actions/token-expiry-gate
        with:
          providers: ${{ vars.CLAUDESEC_TOKEN_EXPIRY_PROVIDERS || 'github,okta' }}
          strict-providers: ${{ vars.CLAUDESEC_TOKEN_EXPIRY_STRICT_PROVIDERS || 'false' }}
          gate-mode: ${{ vars.CLAUDESEC_TOKEN_EXPIRY_GATE_MODE || '24h' }}
          gh-token-expires-at: ${{ vars.GH_TOKEN_EXPIRES_AT || '' }}
          github-token-expires-at: ${{ vars.GITHUB_TOKEN_EXPIRES_AT || '' }}
          okta-oauth-token-expires-at: ${{ vars.OKTA_OAUTH_TOKEN_EXPIRES_AT || '' }}
          datadog-token-expires-at: ${{ vars.DATADOG_TOKEN_EXPIRES_AT || '' }}
          dd-token-expires-at: ${{ vars.DD_TOKEN_EXPIRES_AT || '' }}
          dd-api-key-expires-at: ${{ vars.DD_API_KEY_EXPIRES_AT || '' }}
          slack-token-expires-at: ${{ vars.SLACK_TOKEN_EXPIRES_AT || '' }}
          slack-bot-token-expires-at: ${{ vars.SLACK_BOT_TOKEN_EXPIRES_AT || '' }}

  datadog_ci_collect:
    name: Datadog CI Collect (optional)
    runs-on: ubuntu-latest
    needs: token_expiry_gate
    if: ${{ secrets.DD_API_KEY != '' && secrets.DD_APP_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect Datadog CI logs/signals/cases for dashboard
        uses: ./.github/actions/datadog-ci-collect
        with:
          dd-api-key: ${{ secrets.DD_API_KEY }}
          dd-app-key: ${{ secrets.DD_APP_KEY }}
          dd-site: ${{ vars.DD_SITE || 'datadoghq.com' }}
          dd-service: security-scan-suite
          dd-env: ci
          ci-pipeline-id: ${{ github.run_id }}
          dd-tags: service:security-scan-suite,env:ci,ci_pipeline_id:${{ github.run_id }}

      - name: Upload Datadog sanitized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-suite-datadog
          path: |
            .claudesec-datadog/datadog-logs-sanitized.json
            .claudesec-datadog/datadog-cloud-signals-sanitized.json
            .claudesec-datadog/datadog-cases-sanitized.json
          retention-days: ${{ fromJSON(vars.CLAUDESEC_DD_ARTIFACT_RETENTION_DAYS || '30') }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: token_expiry_gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  semgrep:
    name: Semgrep CE (SARIF)
    runs-on: ubuntu-latest
    needs: token_expiry_gate
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep (auto rules) → SARIF
        run: semgrep scan --config auto --sarif --output semgrep.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  trivy:
    name: Trivy (SCA + IaC) (SARIF)
    runs-on: ubuntu-latest
    needs: token_expiry_gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy filesystem scan → SARIF
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy

  gitleaks:
    name: Gitleaks (secrets) (SARIF)
    runs-on: ubuntu-latest
    needs: token_expiry_gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks → SARIF
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_REPORT_FORMAT: sarif
          GITLEAKS_REPORT_PATH: gitleaks.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  osv_scanner_pr:
    name: OSV-Scanner (PR diff)
    needs: token_expiry_gate
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3
    permissions:
      contents: read
      actions: read
      security-events: write

  osv_scanner_scheduled:
    name: OSV-Scanner (scheduled/full)
    needs: token_expiry_gate
    if: github.event_name != 'pull_request' && github.event_name != 'merge_group'
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3
    permissions:
      contents: read
      actions: read
      security-events: write

  security_summary:
    name: Security Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - codeql
      - semgrep
      - trivy
      - gitleaks
      - osv_scanner_pr
      - osv_scanner_scheduled
      - datadog_ci_collect
    steps:
      - name: Download Datadog artifact (optional)
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: security-scan-suite-datadog
          path: .summary-artifacts/datadog

      - name: Build summary and enforce required job success
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
          DD_RETENTION_RAW: ${{ vars.CLAUDESEC_DD_ARTIFACT_RETENTION_DAYS || '30' }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          needs = json.loads(os.getenv("NEEDS_JSON", "{}") or "{}")
          required = [
              "codeql",
              "semgrep",
              "trivy",
              "gitleaks",
              "osv_scanner_pr",
              "osv_scanner_scheduled",
          ]
          optional = ["datadog_ci_collect"]

          def state(job: str) -> str:
              return str((needs.get(job) or {}).get("result", "unknown"))

          required_failures = []
          for job in required:
              s = state(job)
              if s not in ("success", "skipped"):
                  required_failures.append((job, s))

          datadog_dir = Path(".summary-artifacts/datadog")
          datadog_files = []
          if datadog_dir.exists():
              datadog_files = sorted(
                  p.name for p in datadog_dir.glob("*.json") if p.is_file()
              )

          retention_raw = (os.getenv("DD_RETENTION_RAW", "30") or "30").strip()
          retention_days = None
          try:
              retention_days = int(retention_raw)
          except ValueError:
              retention_days = None

          if retention_days is None or retention_days < 1 or retention_days > 90:
              print(
                  f"::error::CLAUDESEC_DD_ARTIFACT_RETENTION_DAYS must be an integer between 1 and 90 (current: {retention_raw})"
              )
              sys.exit(1)

          server = (os.getenv("GITHUB_SERVER_URL", "") or "").strip()
          repo = (os.getenv("GITHUB_REPOSITORY", "") or "").strip()
          run_id = (os.getenv("GITHUB_RUN_ID", "") or "").strip()
          code_scanning_base = f"{server}/{repo}/security/code-scanning" if server and repo else ""
          artifact_page = f"{server}/{repo}/actions/runs/{run_id}/artifacts" if server and repo and run_id else ""

          sarif_entries = [
              ("CodeQL", "CodeQL managed upload", "codeql"),
              ("Semgrep", "semgrep.sarif", "semgrep"),
              ("Trivy", "trivy.sarif", "trivy"),
              ("Gitleaks", "gitleaks.sarif", "gitleaks"),
              ("OSV Scanner", "osv-scanner (reusable workflow)", "osv"),
          ]

          lines = []
          lines.append("## Security Scan Suite Summary")
          lines.append(f"- Datadog artifact retention days: `{retention_days}`")
          lines.append("### Required jobs")
          for job in required:
              lines.append(f"- {job}: {state(job)}")
          lines.append("### Optional jobs")
          for job in optional:
              lines.append(f"- {job}: {state(job)}")

          lines.append("### SARIF categories")
          for label, artifact_name, tool in sarif_entries:
              if code_scanning_base:
                  lines.append(
                      f"- [{label} alerts]({code_scanning_base}?query=tool%3A{tool}) · artifact: `{artifact_name}`"
                  )
              else:
                  lines.append(f"- {label} alerts · artifact: `{artifact_name}`")

          if datadog_files:
              lines.append("### Datadog artifacts")
              for name in datadog_files:
                  if artifact_page:
                      lines.append(f"- [{name}]({artifact_page})")
                  else:
                      lines.append(f"- {name}")
          else:
              lines.append("### Datadog artifacts")
              lines.append("- none (job skipped or artifact unavailable)")

          summary_text = "\n".join(lines)
          print(summary_text)
          step_summary = os.getenv("GITHUB_STEP_SUMMARY", "")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as f:
                  f.write(summary_text + "\n")

          if required_failures:
              for job, s in required_failures:
                  print(f"::error::{job} ended with {s}")
              sys.exit(1)
          PY
