# .github/workflows/sbom.yml
# ClaudeSec template — SBOM generation, vulnerability scan, and artifact signing

name: SBOM & Supply Chain

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DD_SERVICE: sbom
  DD_ENV: ci
  CI_PIPELINE_ID: ${{ github.run_id }}

jobs:
  sbom:
    name: Generate SBOM & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM
        run: syft . -o cyclonedx-json > sbom.cdx.json

      - name: Generate SPDX SBOM
        run: syft . -o spdx-json > sbom.spdx.json

      - name: Install Grype
        uses: anchore/scan-action/download-grype@v4

      - name: Scan for vulnerabilities
        run: |
          grype sbom:sbom.cdx.json \
            --fail-on high \
            --output table \
            --output json=vuln-report.json

      - name: Sign SBOM with Cosign
        uses: sigstore/cosign-installer@v3
      - run: |
          cosign sign-blob --yes \
            sbom.cdx.json \
            --bundle sbom.cdx.json.bundle

      - name: Upload SBOM to release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release upload ${{ github.ref_name }} \
            sbom.cdx.json \
            sbom.spdx.json \
            sbom.cdx.json.bundle \
            vuln-report.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.*.json
            *.bundle
            vuln-report.json
